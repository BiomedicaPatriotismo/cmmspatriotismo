<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCMMS - Mantenimiento</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .tabla-calendario th, .tabla-calendario td {
            border: 1px solid #1e3a8a;
        }
        .tabla-calendario th {
            background-color: #60a5fa;
            color: white;
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
        }
        .celda-programada {
            background-color: #3b82f6 !important;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }
        .celda-ejecutada {
            background-color: #22c55e !important;
            position: relative;
        }
        .celda-ejecutada::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .celda-interactiva {
            min-width: 25px;
            height: 25px;
            text-align: center;
            transition: all 0.2s;
        }
        .celda-interactiva:hover {
            background-color: #bfdbfe;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

     <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const GOOGLE_SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwsPJJ9SQdgz3l8BEDMwpcOT0hYhrfLL3qIdTAYJ7q_Pji5ZBzu_Pt-zmvqcmtokVKi/exec"; 

        const motivosOptions = ["PENDIENTE DE CALIBRACION", "EN MANTENIMIENTO PREVENTIVO", "EN REPARACION", "EN ESPERA DE REFACCIONES", "DAÑO SIN POSIBILIDAD DE REPARACION", "PRESTADO", "EN CAMBIO O SUSTITUCION", "BAJA DEFINITIVA"];
        const frecuenciasOptions = [
            { id: '', label: 'No aplica' }, { id: 'M', label: 'MENSUAL' }, { id: 'B', label: 'BIMESTRAL' },
            { id: 'T', label: 'TRIMESTRAL' }, { id: 'C', label: 'CUATRIMESTRAL' }, { id: 'S', label: 'SEMESTRAL' }, { id: 'A', label: 'ANUAL' }
        ];
        const mesesAbreviados = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];

        // CALCULO PROYECCIONES
        const calcularProximoMantenimiento = (fechaUltimo, frecuencia) => {
            if (!fechaUltimo || !frecuencia) return '';
            const [yearStr, monthStr] = fechaUltimo.split('-');
            let date = new Date(parseInt(yearStr), parseInt(monthStr) - 1, 1);
            if (isNaN(date.getTime())) return '';
            let meses = frecuencia === 'M'?1 : frecuencia==='B'?2 : frecuencia==='T'?3 : frecuencia==='C'?4 : frecuencia==='S'?6 : frecuencia==='A'?12 : 0;
            date.setMonth(date.getMonth() + meses);
            const m = date.getMonth() + 1;
            return `${date.getFullYear()}-${m < 10 ? '0' : ''}${m}`; 
        };

        const obtenerMesesProgramados = (ultimoMantenimiento, frecuencia, targetYear) => {
            const mesesProgramados = new Set();
            if (!ultimoMantenimiento || !frecuencia) return mesesProgramados;
            const [uYear, uMonth] = ultimoMantenimiento.split('-').map(Number);
            if (!uYear || !uMonth) return mesesProgramados;

            let interval = frecuencia === 'M'?1 : frecuencia==='B'?2 : frecuencia==='T'?3 : frecuencia==='C'?4 : frecuencia==='S'?6 : frecuencia==='A'?12 : 0;
            if (interval === 0) return mesesProgramados;

            let startMonth = uMonth - 1; 
            let startYear = uYear;

            while (startYear >= targetYear && interval > 0) {
                startMonth -= interval;
                while (startMonth < 0) { startMonth += 12; startYear -= 1; }
            }

            let simMonth = startMonth;
            let simYear = startYear;
            for (let i = 0; i < 100; i++) {
                simMonth += interval;
                while (simMonth > 11) { simMonth -= 12; simYear += 1; }
                if (simYear === targetYear) { mesesProgramados.add(simMonth); }
                else if (simYear > targetYear) { break; }
            }
            return mesesProgramados;
        };

        // EVALUACIÓN DE CUMPLIMIENTO CON HOLGURA ±1 MES
        const verificarCumplimiento = (historialEjecuciones, targetMonthIndex, targetYear) => {
            if (!historialEjecuciones) return false;
            const ejecutados = historialEjecuciones.toString().split(',').map(s => s.trim());
            
            // Calculamos mes actual, anterior y siguiente
            const formatYM = (y, m) => `${y}-${(m + 1).toString().padStart(2, '0')}`;
            
            let pMonth = targetMonthIndex - 1, pYear = targetYear;
            if (pMonth < 0) { pMonth = 11; pYear--; }
            
            let nMonth = targetMonthIndex + 1, nYear = targetYear;
            if (nMonth > 11) { nMonth = 0; nYear++; }

            const mActual = formatYM(targetYear, targetMonthIndex);
            const mPrevio = formatYM(pYear, pMonth);
            const mSiguiente = formatYM(nYear, nMonth);

            return ejecutados.includes(mActual) || ejecutados.includes(mPrevio) || ejecutados.includes(mSiguiente);
        };

        const CMMSHospitalario = () => {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [inventarioTab, setInventarioTab] = useState('Propio');
          const [equipos, setEquipos] = useState([]);
          const [isSyncing, setIsSyncing] = useState(false);
          const [showAddEquipo, setShowAddEquipo] = useState(false);
          
          const [searchTerm, setSearchTerm] = useState('');
          const [filterEstatus, setFilterEstatus] = useState('Todos');
          const [filterUbicacionCal, setFilterUbicacionCal] = useState('Todas');
          const [calendarYear, setCalendarYear] = useState(new Date().getFullYear());
          const [dashYear, setDashYear] = useState(new Date().getFullYear());

          const [selectedEquipo, setSelectedEquipo] = useState(null);
          const [isEditing, setIsEditing] = useState(false);
          const [equipoEditado, setEquipoEditado] = useState(null);
          
          const estadoInicialEquipo = {
            origen: inventarioTab, numero: '', numeroInventario: '', estatus: 'En Servicio',
            motivoFueraServicio: '', nombre: '', marca: '', polizaMantenimiento: 'No', modelo: '',
            numeroSerie: '', fabricante: '', nivelRiesgo: 'I', ubicacion: '', fechaAlta: '',
            proveedorMantenimiento: '', descripcion: '', tipoTecnologia: 'Equipo Médico',
            frecuenciaMantenimiento: '', ultimoMantenimiento: '', proximoMantenimiento: '',
            historialEjecuciones: ''
          };
          const [nuevoEquipo, setNuevoEquipo] = useState(estadoInicialEquipo);

          useEffect(() => { handleSyncSheets(); }, []);

          const stats = useMemo(() => {
            return {
              total: equipos.length,
              propios: equipos.filter(e => e.origen === 'Propio').length,
              comodato: equipos.filter(e => e.origen === 'Comodato').length,
              renta: equipos.filter(e => e.origen === 'Renta').length,
              criticos: equipos.filter(e => e.estatus === 'Fuera de Servicio').length,
            };
          }, [equipos]);

          const equiposFiltrados = useMemo(() => {
            return equipos.filter(e => {
              const matchHoja = e.origen === inventarioTab;
              const matchEstatus = filterEstatus === 'Todos' || e.estatus === filterEstatus;
              if (!searchTerm) return matchHoja && matchEstatus;
              const s = searchTerm.toLowerCase();
              return matchHoja && matchEstatus && (
                String(e.nombre || '').toLowerCase().includes(s) ||
                String(e.numeroInventario || '').toLowerCase().includes(s) ||
                String(e.marca || '').toLowerCase().includes(s) ||
                String(e.numeroSerie || '').toLowerCase().includes(s)
              );
            });
          }, [equipos, inventarioTab, searchTerm, filterEstatus]);

          const ubicacionesUnicas = useMemo(() => {
              const locs = equipos.filter(e => e.origen === inventarioTab).map(e => e.ubicacion).filter(u => u && u.trim() !== '');
              return ['Todas', ...new Set(locs)].sort();
          }, [equipos, inventarioTab]);

          const equiposCalendario = useMemo(() => {
              return equipos.filter(e => {
                  if (e.origen !== inventarioTab) return false;
                  if (filterUbicacionCal === 'Todas') return true;
                  return e.ubicacion === filterUbicacionCal;
              });
          }, [equipos, inventarioTab, filterUbicacionCal]);

          // DATA PARA DASHBOARD - CUMPLIMIENTO MENSUAL
          const monthlyCompliance = useMemo(() => {
              return mesesAbreviados.map((nombreMes, monthIndex) => {
                  let programados = 0;
                  let cumplidos = 0;

                  equipos.forEach(equipo => {
                      const mesesProgramados = obtenerMesesProgramados(equipo.ultimoMantenimiento, equipo.frecuenciaMantenimiento, dashYear);
                      if (mesesProgramados.has(monthIndex)) {
                          programados++;
                          if (verificarCumplimiento(equipo.historialEjecuciones, monthIndex, dashYear)) {
                              cumplidos++;
                          }
                      }
                  });

                  const pct = programados === 0 ? 100 : Math.round((cumplidos / programados) * 100);
                  return { mes: nombreMes, programados, cumplidos, pct };
              });
          }, [equipos, dashYear]);

          const handleSyncSheets = async () => {
            setIsSyncing(true);
            if (!GOOGLE_SHEETS_WEBAPP_URL) { setTimeout(() => setIsSyncing(false), 1000); return; }
            try {
              const response = await fetch(`${GOOGLE_SHEETS_WEBAPP_URL}?action=getAll`);
              const data = await response.json();
              
              // Filtro inteligente: Elimina filas vacías y crea un ID 100% único por cada hoja
              const procesarHoja = (arr, origen) => {
                  return (arr || [])
                    .filter(e => e.numeroInventario || e.nombre) // Ignora filas fantasma
                    .map(e => ({...e, origen, id: `${origen}-${e.id}`})); // ID Único
              };

              const equiposSheets = [
                ...procesarHoja(data.propio, 'Propio'),
                ...procesarHoja(data.comodato, 'Comodato'),
                ...procesarHoja(data.renta, 'Renta')
              ];
              
              setEquipos(equiposSheets);
            } catch (error) { console.error(error); } finally { setIsSyncing(false); }
          };

          const directSaveToSheets = async (equipo) => {
             if (GOOGLE_SHEETS_WEBAPP_URL) {
              try {
                // Notificamos inicio pero no bloqueamos la UI pesadamente
                setIsSyncing(true);
                await fetch(GOOGLE_SHEETS_WEBAPP_URL, {
                  method: 'POST',
                  body: JSON.stringify({ action: 'edit', data: equipo, sheetName: equipo.origen, id: equipo.id, originalInventario: equipo.numeroInventario })
                });
              } catch (error) { console.error(error); } finally { setIsSyncing(false); }
            }
          };

          const handleUpdateEquipo = async (e) => {
            e.preventDefault();
            setEquipos(equipos.map(eq => eq.id === equipoEditado.id ? equipoEditado : eq));
            setSelectedEquipo(equipoEditado);
            setIsEditing(false);
            directSaveToSheets(equipoEditado);
          };

          const handleAddEquipo = async (e) => {
            e.preventDefault();
            const id = `${nuevoEquipo.origen}-${Date.now()}`;
            const numero = equipos.length > 0 ? Math.max(...equipos.map(eq => Number(eq.numero) || 0)) + 1 : 1;
            const equipoGuardar = { ...nuevoEquipo, id, numero };
            
            if (GOOGLE_SHEETS_WEBAPP_URL) {
              try {
                setIsSyncing(true);
                await fetch(GOOGLE_SHEETS_WEBAPP_URL, {
                  method: 'POST', body: JSON.stringify({ action: 'add', data: equipoGuardar, sheetName: equipoGuardar.origen })
                });
              } catch (error) {} finally { setIsSyncing(false); }
            }
            setEquipos([...equipos, equipoGuardar]);
            setShowAddEquipo(false);
            setNuevoEquipo(estadoInicialEquipo);
          };

          // ACCIÓN: Clic en el calendario marca palomita guardando directamente el string en Sheets
          const toggleMantenimientoEjecutado = (equipo, monthIndex, year) => {
              const strY = year.toString();
              const strM = (monthIndex + 1).toString().padStart(2, '0');
              const targetStr = `${strY}-${strM}`; // Ejemplo: "2026-04"

              // Convertimos el historial existente (string) a arreglo
              let historialArr = equipo.historialEjecuciones ? equipo.historialEjecuciones.toString().split(',').map(s => s.trim()).filter(Boolean) : [];
              
              if (historialArr.includes(targetStr)) {
                  // Si ya estaba, lo quitamos
                  historialArr = historialArr.filter(h => h !== targetStr);
              } else {
                  // Si no estaba, lo agregamos
                  historialArr.push(targetStr);
              }

              // Creamos el equipo actualizado con el nuevo string separado por comas
              const updatedEquipo = { ...equipo, historialEjecuciones: historialArr.join(',') };
              
              // Actualizamos interfaz
              setEquipos(equipos.map(eq => eq.id === updatedEquipo.id ? updatedEquipo : eq));
              
              // Guardamos en Google Sheets
              directSaveToSheets(updatedEquipo);
          };

          const handleQuickStatusChange = (newStatus) => {
            const updatedEquipo = { ...selectedEquipo, estatus: newStatus };
            if (newStatus === 'En Servicio') { updatedEquipo.motivoFueraServicio = ''; } 
            else if (!updatedEquipo.motivoFueraServicio) { updatedEquipo.motivoFueraServicio = motivosOptions[0]; }
            setSelectedEquipo(updatedEquipo);
            setEquipos(equipos.map(eq => eq.id === updatedEquipo.id ? updatedEquipo : eq));
            directSaveToSheets(updatedEquipo);
          };

          const handleQuickMotivoChange = (newMotivo) => {
            const updatedEquipo = { ...selectedEquipo, motivoFueraServicio: newMotivo };
            setSelectedEquipo(updatedEquipo);
            setEquipos(equipos.map(eq => eq.id === updatedEquipo.id ? updatedEquipo : eq));
            directSaveToSheets(updatedEquipo);
          };

          const handleNewEquipoMantenimientoChange = (field, value) => {
              const updated = { ...nuevoEquipo, [field]: value };
              updated.proximoMantenimiento = calcularProximoMantenimiento(updated.ultimoMantenimiento, updated.frecuenciaMantenimiento);
              setNuevoEquipo(updated);
          };

          const handleEditEquipoMantenimientoChange = (field, value) => {
              const updated = { ...equipoEditado, [field]: value };
              updated.proximoMantenimiento = calcularProximoMantenimiento(updated.ultimoMantenimiento, updated.frecuenciaMantenimiento);
              setEquipoEditado(updated);
          };

          const getEstatusColor = (estatus) => {
            const status = estatus ? estatus.toLowerCase() : '';
            if (status.includes('servicio') && !status.includes('fuera')) return 'bg-emerald-100 text-emerald-800 border-emerald-300';
            else if (status.includes('fuera de servicio')) return 'bg-red-100 text-red-800 border-red-300';
            return 'bg-gray-100 text-gray-800 border-gray-300'; 
          };

          // ==============================
          // RENDER COMPONENTS
          // ==============================

          const renderDashboard = () => (
            <div className="space-y-6 animate-in fade-in duration-300">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                  <i className="fas fa-chart-line text-blue-600"></i> Panel de Control
                </h2>
                <button onClick={handleSyncSheets} disabled={isSyncing} className="flex items-center gap-2 bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg hover:bg-emerald-200 transition font-medium text-sm">
                  <i className={`fas fa-sync-alt ${isSyncing ? "fa-spin" : ""}`}></i>
                  {isSyncing ? 'Sincronizando...' : 'Sincronizar Datos'}
                </button>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500 font-medium">Equipo Propio</p>
                    <p className="text-3xl font-bold text-blue-600">{stats.propios}</p>
                  </div>
                  <div className="bg-blue-100 p-3 rounded-lg text-blue-600"><i className="fas fa-database text-2xl"></i></div>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500 font-medium">En Comodato</p>
                    <p className="text-3xl font-bold text-purple-600">{stats.comodato}</p>
                  </div>
                  <div className="bg-purple-100 p-3 rounded-lg text-purple-600"><i className="fas fa-server text-2xl"></i></div>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500 font-medium">En Renta</p>
                    <p className="text-3xl font-bold text-amber-500">{stats.renta}</p>
                  </div>
                  <div className="bg-amber-100 p-3 rounded-lg text-amber-600"><i className="fas fa-heartbeat text-2xl"></i></div>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500 font-medium">Fuera de Servicio</p>
                    <p className="text-3xl font-bold text-red-500">{stats.criticos}</p>
                  </div>
                  <div className="bg-red-100 p-3 rounded-lg text-red-600"><i className="fas fa-exclamation-triangle text-2xl"></i></div>
                </div>
              </div>

              {/* DASHBOARD: INDICADORES DE CUMPLIMIENTO */}
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mt-6">
                <div className="flex justify-between items-center mb-6">
                    <h3 className="text-lg font-bold text-gray-800"><i className="fas fa-clipboard-check text-blue-600 mr-2"></i> Cumplimiento Mensual (Tolerancia ±1 Mes)</h3>
                    <div className="flex items-center gap-2">
                        <label className="text-sm font-bold text-gray-500">AÑO:</label>
                        <input type="number" value={dashYear} onChange={(e) => setDashYear(parseInt(e.target.value))} className="w-20 p-1 text-center border border-gray-300 rounded text-sm font-bold" />
                    </div>
                </div>
                
                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    {monthlyCompliance.map(mesData => (
                        <div key={mesData.mes} className={`border rounded-lg p-3 text-center transition-colors ${mesData.programados === 0 ? 'bg-gray-50 border-gray-200 opacity-60' : 'bg-white border-gray-200 shadow-sm'}`}>
                            <p className="font-bold text-gray-700">{mesData.mes}</p>
                            <div className="my-2">
                                <span className={`text-2xl font-black ${mesData.pct >= 80 ? 'text-emerald-500' : mesData.pct >= 50 ? 'text-amber-500' : 'text-red-500'}`}>
                                    {mesData.programados === 0 ? '-' : `${mesData.pct}%`}
                                </span>
                            </div>
                            <div className="text-xs text-gray-500 flex justify-center gap-2 font-medium">
                                <span title="Cumplidos" className="text-emerald-600"><i className="fas fa-check"></i> {mesData.cumplidos}</span>
                                <span title="Programados" className="text-blue-600"><i className="fas fa-wrench"></i> {mesData.programados}</span>
                            </div>
                        </div>
                    ))}
                </div>
              </div>
            </div>
          );

          const renderCalendarios = () => (
              <div className="space-y-6 animate-in fade-in duration-300">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <i className="far fa-calendar-alt text-blue-600"></i> Calendario de Mantenimiento Preventivo
                      </h2>
                      <button onClick={handleSyncSheets} disabled={isSyncing} className="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition shadow-sm font-medium text-sm">
                        <i className={`fas fa-sync-alt ${isSyncing ? "fa-spin" : ""}`}></i> 
                        {isSyncing ? 'Sincronizando...' : 'Sincronizar Sheets'}
                      </button>
                  </div>

                  <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                      <div className="flex border-b border-gray-100 bg-gray-50/50 overflow-x-auto">
                        <button onClick={() => setInventarioTab('Propio')} className={`flex-1 py-3 px-4 text-sm font-medium transition-colors border-b-2 whitespace-nowrap ${inventarioTab === 'Propio' ? 'border-blue-600 text-blue-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>Hoja 1: Equipo Propio</button>
                        <button onClick={() => setInventarioTab('Comodato')} className={`flex-1 py-3 px-4 text-sm font-medium transition-colors border-b-2 whitespace-nowrap ${inventarioTab === 'Comodato' ? 'border-purple-600 text-purple-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>Hoja 2: Comodato</button>
                        <button onClick={() => setInventarioTab('Renta')} className={`flex-1 py-3 px-4 text-sm font-medium transition-colors border-b-2 whitespace-nowrap ${inventarioTab === 'Renta' ? 'border-amber-600 text-amber-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>Hoja 3: Renta</button>
                      </div>

                      <div className="bg-white p-4 border-b border-gray-100 flex flex-wrap items-center gap-4">
                          <div className="flex items-center gap-2 flex-1 min-w-[200px]">
                              <label className="text-xs font-bold text-gray-500 uppercase"><i className="fas fa-map-marker-alt mr-1"></i> Filtrar por Área:</label>
                              <select value={filterUbicacionCal} onChange={(e) => setFilterUbicacionCal(e.target.value)} className="w-full py-2 px-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                                  {ubicacionesUnicas.map(ub => <option key={ub} value={ub}>{ub}</option>)}
                              </select>
                          </div>
                          <div className="flex items-center gap-2">
                              <label className="text-xs font-bold text-gray-500 uppercase"><i className="far fa-calendar mr-1"></i> Año:</label>
                              <input type="number" value={calendarYear} onChange={(e) => setCalendarYear(parseInt(e.target.value))} className="w-24 py-2 px-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none text-center font-bold" />
                          </div>
                      </div>

                      <div className="overflow-x-auto">
                          <table className="w-full text-left border-collapse tabla-calendario text-xs whitespace-nowrap">
                              <thead>
                                  <tr>
                                      <th className="p-2 w-24">Control</th>
                                      <th className="p-2">Equipo</th>
                                      <th className="p-2">Marca</th>
                                      <th className="p-2">Modelo</th>
                                      <th className="p-2">Serie</th>
                                      <th className="p-2">Ubicación</th>
                                      <th className="p-2">Contrato</th>

                        onChange={(e) => setSearchTerm(e.target.value)}
                        placeholder={`Buscar en ${inventarioTab.toLowerCase()} (Nombre, Marca, Serie, Inv)...`} 
                        className="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" 
                      />
                    </div>
                    <div className="flex items-center gap-2">
                        <label className="text-xs font-bold text-gray-500 uppercase"><i className="fas fa-filter"></i> Filtro Estatus:</label>
                        <select 
                            value={filterEstatus}
                            onChange={(e) => setFilterEstatus(e.target.value)}
                            className="py-2 px-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500 font-medium"
                        >
                            <option value="Todos">Mostrar Todos</option>
                            <option value="En Servicio">Sólo En Servicio</option>
                            <option value="Fuera de Servicio">Sólo Fuera de Servicio</option>
                        </select>
                    </div>
                  </div>
                  
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse whitespace-nowrap">
                      <thead>
                        <tr className="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider">
                          <th className="p-4 font-bold border-b">NO. INV.</th>
                          <th className="p-4 font-bold border-b">EQUIPO / TECNOLOGÍA</th>
                          <th className="p-4 font-bold border-b">MARCA</th>
                          <th className="p-4 font-bold border-b">MODELO</th>
                          <th className="p-4 font-bold border-b">SERIE</th>
                        </tr>
                      </thead>
                      <tbody>
                        {equiposFiltrados.length === 0 && (
                          <tr><td colSpan="5" className="p-8 text-center text-gray-500">No se encontraron equipos con esos criterios.</td></tr>
                        )}
                        {equiposFiltrados.map((equipo) => (
                          <tr 
                            key={equipo.id} 
                            onClick={() => setSelectedEquipo(equipo)}
                            className="border-b border-gray-50 hover:bg-blue-50/50 transition cursor-pointer text-sm group"
                          >
                            <td className="p-4">
                              <span className={`px-3 py-1.5 rounded-lg border font-bold text-xs uppercase tracking-wider shadow-sm transition-colors ${getEstatusColor(equipo.estatus)}`}>
                                {equipo.numeroInventario || 'S/N'}
                              </span>
                            </td>
                            <td className="p-4 text-gray-800 font-medium group-hover:text-blue-700 transition-colors">
                              {equipo.nombre}
                            </td>
                            <td className="p-4 text-gray-600">{equipo.marca || '-'}</td>
                            <td className="p-4 text-gray-600">{equipo.modelo || '-'}</td>
                            <td className="p-4 text-gray-500 font-mono text-xs">{equipo.numeroSerie || '-'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans">
              <aside className="w-full md:w-64 bg-slate-900 text-white flex flex-col shadow-xl z-10 md:min-h-screen">
                <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                  <div className="bg-blue-500 p-2 rounded-lg w-10 h-10 flex items-center justify-center"><i className="fas fa-thermometer-half text-white text-xl"></i></div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight">MediCMMS</h1>
                    <p className="text-xs text-slate-400">Google Sheets Sync</p>
                  </div>
                </div>
                
                <nav className="flex-1 p-4 space-y-2">
                  <button onClick={() => {setActiveTab('dashboard'); setSelectedEquipo(null);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <i className="fas fa-columns w-5 text-center"></i> Dashboard
                  </button>
                  <button onClick={() => {setActiveTab('equipos'); setSelectedEquipo(null);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${activeTab === 'equipos' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <i className="fas fa-stethoscope w-5 text-center"></i> Inventario
                  </button>
                  <button onClick={() => {setActiveTab('calendarios'); setSelectedEquipo(null);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${activeTab === 'calendarios' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <i className="far fa-calendar-alt w-5 text-center"></i> Calendarios
                  </button>
                  <button onClick={() => {setActiveTab('tareas'); setSelectedEquipo(null);}} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors ${activeTab === 'tareas' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <i className="fas fa-clipboard-list w-5 text-center"></i> Órdenes de Trabajo
                  </button>
                </nav>
              </aside>

              <main className="flex-1 p-6 md:p-8 overflow-y-auto relative">
                <div className="max-w-7xl mx-auto">
                  {activeTab === 'dashboard' && renderDashboard()}
                  {activeTab === 'equipos' && renderEquipos()}
                  {activeTab === 'calendarios' && renderCalendarios()}
                  {activeTab === 'tareas' && (
                    <div className="bg-white p-8 rounded-xl text-center shadow-sm border border-gray-100 animate-in fade-in duration-300">
                       <h3 className="text-xl font-bold text-gray-800 mb-2">Órdenes de Trabajo</h3>
                       <p className="text-gray-500">Módulo en construcción para integración con calendario.</p>
                    </div>
                  )}
                </div>
              </main>

              {/* Modal Agregar Equipo */}
              {showAddEquipo && (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-xl shadow-xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                    <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-blue-50">
                      <div>
                        <h3 className="text-lg font-bold text-gray-800">Registrar Nuevo Equipo</h3>
                        <p className="text-xs text-blue-600 font-medium mt-1 flex items-center gap-1">
                          <i className="fas fa-database"></i> Se guardará en la hoja: <strong>{nuevoEquipo.origen}</strong>
                        </p>
                      </div>
                      <button onClick={() => setShowAddEquipo(false)} className="text-gray-400 hover:text-gray-600 text-xl font-bold">✕</button>
                    </div>
                    
                    <form onSubmit={handleAddEquipo} className="p-6 overflow-y-auto flex-1">
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div className="lg:col-span-3 bg-blue-50 p-3 rounded-lg border border-blue-100 mb-2">
                          <label className="block text-xs font-bold text-blue-800 mb-1">¿A qué hoja de cálculo pertenece este registro?</label>
                          <select value={nuevoEquipo.origen} onChange={(e) => setNuevoEquipo({...nuevoEquipo, origen: e.target.value})} className="w-full md:w-1/3 px-3 py-2 border border-blue-200 rounded-lg text-sm font-medium text-blue-900 bg-white">
                            <option value="Propio">Hoja: Equipo Propio</option>
                            <option value="Comodato">Hoja: Equipo en Comodato</option>
                            <option value="Renta">Hoja: Equipo en Renta</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-gray-700 mb-1">Núm. de Inventario Interno *</label>
                          <input required type="text" value={nuevoEquipo.numeroInventario} onChange={(e) => setNuevoEquipo({...nuevoEquipo, numeroInventario: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Ej. INV-1234" />
                        </div>
                        <div className="lg:col-span-2">
                          <label className="block text-xs font-bold text-gray-700 mb-1">Nombre del Equipo o Tecnología *</label>
                          <input required type="text" value={nuevoEquipo.nombre} onChange={(e) => setNuevoEquipo({...nuevoEquipo, nombre: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-gray-700 mb-1">¿Equipo o Tecnología?</label>
                          <select value={nuevoEquipo.tipoTecnologia} onChange={(e) => setNuevoEquipo({...nuevoEquipo, tipoTecnologia: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
                            <option value="Equipo Médico">Equipo Médico</option>
                            <option value="Tecnología de Apoyo">Tecnología de Apoyo / Software</option>
                            <option value="Infraestructura">Infraestructura</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-gray-700 mb-1">Estatus *</label>
                          <select required value={nuevoEquipo.estatus} onChange={(e) => setNuevoEquipo({...nuevoEquipo, estatus: e.target.value, motivoFueraServicio: e.target.value === 'En Servicio' ? '' : motivosOptions[0]})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
                            <option value="En Servicio">En Servicio</option>
                            <option value="Fuera de Servicio">Fuera de Servicio</option>
                          </select>
                        </div>

                        {nuevoEquipo.estatus === 'Fuera de Servicio' && (
                          <div className="lg:col-span-3 bg-red-50 p-3 rounded-lg border border-red-200 mb-2">
                            <label className="block text-xs font-bold text-red-600 mb-1">Seleccione el motivo de "Fuera de Servicio"</label>
                            <select value={nuevoEquipo.motivoFueraServicio} onChange={(e) => setNuevoEquipo({...nuevoEquipo, motivoFueraServicio: e.target.value})} className="w-full md:w-1/2 px-3 py-2 border border-red-300 rounded-lg text-sm bg-white text-red-800 font-medium">
                              {motivosOptions.map(m => <option key={m} value={m}>{m}</option>)}
                            </select>
                          </div>
                        )}

                        <div className="lg:col-span-3 border-t border-gray-200 my-2 pt-4">
                            <h4 className="text-sm font-bold text-gray-800 mb-3"><i className="fas fa-wrench mr-2 text-blue-500"></i>Configuración de Mantenimiento Preventivo</h4>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-700 mb-1">Frecuencia</label>
                                    <select value={nuevoEquipo.frecuenciaMantenimiento} onChange={(e) => handleNewEquipoMantenimientoChange('frecuenciaMantenimiento', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
                                      {frecuenciasOptions.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-700 mb-1">Mes/Año del Último Servicio</label>
                                    <input type="month" value={nuevoEquipo.ultimoMantenimiento} onChange={(e) => handleNewEquipoMantenimientoChange('ultimoMantenimiento', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-700 mb-1">Mes/Año Próximo (Calculado)</label>
                                    <input type="month" value={nuevoEquipo.proximoMantenimiento} readOnly className="w-full px-3 py-2 border border-blue-200 bg-blue-50 text-blue-800 font-bold rounded-lg text-sm cursor-not-allowed" />
                                </div>
                            </div>
                        </div>

                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Marca</label><input type="text" value={nuevoEquipo.marca} onChange={(e) => setNuevoEquipo({...nuevoEquipo, marca: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Modelo o Versión</label><input type="text" value={nuevoEquipo.modelo} onChange={(e) => setNuevoEquipo({...nuevoEquipo, modelo: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Número de Serie</label><input type="text" value={nuevoEquipo.numeroSerie} onChange={(e) => setNuevoEquipo({...nuevoEquipo, numeroSerie: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Fabricante</label><input type="text" value={nuevoEquipo.fabricante} onChange={(e) => setNuevoEquipo({...nuevoEquipo, fabricante: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div><label className="block text-xs font-bold text-gray-700 mb-1">Ubicación Física *</label><input required type="text" value={nuevoEquipo.ubicacion} onChange={(e) => setNuevoEquipo({...nuevoEquipo, ubicacion: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div>
                          <label className="block text-xs font-medium text-gray-700 mb-1">¿Póliza Preventivo Vigente?</label>
                          <select value={nuevoEquipo.polizaMantenimiento} onChange={(e) => setNuevoEquipo({...nuevoEquipo, polizaMantenimiento: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
                            <option value="Sí">Sí</option><option value="No">No</option>
                          </select>
                        </div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Nivel de Riesgo</label><input type="text" value={nuevoEquipo.nivelRiesgo} onChange={(e) => setNuevoEquipo({...nuevoEquipo, nivelRiesgo: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Proveedor de Mantenimiento</label><input type="text" value={nuevoEquipo.proveedorMantenimiento} onChange={(e) => setNuevoEquipo({...nuevoEquipo, proveedorMantenimiento: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Fecha de Alta</label><input type="date" value={nuevoEquipo.fechaAlta} onChange={(e) => setNuevoEquipo({...nuevoEquipo, fechaAlta: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div className="lg:col-span-3">
                          <label className="block text-xs font-medium text-gray-700 mb-1">Descripción del Equipo</label>
                          <textarea value={nuevoEquipo.descripcion} onChange={(e) => setNuevoEquipo({...nuevoEquipo, descripcion: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" rows="3"></textarea>
                        </div>
                      </div>
                      <div className="pt-6 mt-6 border-t border-gray-100 flex gap-3 justify-end">
                        <button type="button" onClick={() => setShowAddEquipo(false)} className="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium">Cancelar</button>
                        <button disabled={isSyncing} type="submit" className="flex items-center gap-2 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-sm font-medium">
                          {isSyncing ? <i className="fas fa-sync-alt fa-spin"></i> : <i className="fas fa-save"></i>}
                          {isSyncing ? 'Guardando en Sheets...' : 'Guardar y Sincronizar'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CMMSHospitalario />);
    </script>
</body>
</html>
