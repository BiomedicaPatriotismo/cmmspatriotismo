<body class="bg-slate-50">

     <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // ============================================================================
        // CONFIGURACIÓN GLOBAL
        // ============================================================================
        const GOOGLE_SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyctwfWaVlLRZVUH9P-6Z_PvCg_91W1Yc4sgFym72udvRq310JKk8p4GJR22Sqp-Ano/exec"; 
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpv30jyddCIL2Zwwkz_zlEk52O_Aa1iioBPZv90ZnjJ4uy7grVHbIcJQgIRP6xDvLJ53UJ396WfcZE/pub?output=csv";

        // Normaliza Si/SI/Sí/sí/S/1/TRUE -> true. Evita depender de la
        // escritura exacta capturada en la hoja de cálculo.
        const esAfirmativo = (v) => {
            if (v === true) return true;
            if (v === null || v === undefined) return false;
            const s = String(v).trim()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .toUpperCase();
            return s === 'SI' || s === 'S' || s === 'TRUE' || s === '1' || s === 'VIGENTE';
        };

        // Normaliza texto para comparaciones: sin acentos, mayúsculas, sin
        // espacios extra. La hoja mezcla "En Servicio" y "EN SERVICIO".
        const normTexto = (v) => String(v || '').trim()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .replace(/\s+/g, ' ')
            .toUpperCase();

        const estaFueraServicio = (e) => normTexto(e && e.estatus).indexOf('FUERA') > -1;
        const estaEnServicio = (e) => !estaFueraServicio(e) && normTexto(e && e.estatus).indexOf('SERVICIO') > -1;
        const esBajaDefinitiva = (e) => normTexto(e && e.motivoFueraServicio) === 'BAJA DEFINITIVA';

        // ============================================================================
        // GENERADOR DE ETIQUETAS DE IDENTIFICACIÓN DE EQUIPO
        // ----------------------------------------------------------------------------
        // El QR es fijo: apunta a la aplicación CMMS (base de datos de equipos).
        // Va incrustado en base64 para que la etiqueta se genere e imprima aunque
        // la red del hospital bloquee CDNs externas o no haya internet.
        // ============================================================================
        const QR_BASE64 = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUAAAAFAAQAAAADl65gHAAADU0lEQVR42u1bS66jQAwsnkZ67Nw3IPc/VecGxY5ZeRa2u+mE33ZokFAgtBKlVHaVCzIorm0/eBb+5wuhtFdRVTsWCkXV9nL1wfF7Y4OjIShKiCoBUYqdElKudo8jsQAEErBwwQgQqcGRxsHKS9orDVJguooje+JjA+N6oShF38OQAOE8DC/JT3+sW4o6Znljc6Hk+YV5yvJ+eZvM8+vgq9N2q7gjjulwUQLwB4AoMBt0aeIMCDHLO2GAlKt985F7Cxa/+gPMwzAMLwBzgrwT7Ch65l+/+tT1DhNDZ2Kja/NqW7/RO47jMYxQTgyRIUQ5hYt0zQYwGY7cd0896nVb25WIdMsjhZzEZO5cTvl4X53hsoYrmDimFVMXn2eEEzGxuMeocLPiqrnOMzzouUb0m/Ixnc2FdZSxPYYZbY467o+pIkkAC52CLDRlzIVe2jYUxixD+HD4zNdXcgrlZCCKaobjBinMlKrXvMLyu+p1aoRgTG3DRK1l9zqIGrdG6cHFw8dtdeU6NyvxzsrzmL64I/qqa+4bqXviyI3fzZaPSqFHZCyJjwSgnkY+fDyZaQxFd9xSICWkzDRX/OOdcaxmkVtUZO2PnjXGGFPp6RR99NrxSrvzhxLCKSpZdKu6q86wRxx5OsN5f0SkO7Jqloz+aJg+fNx0e6nho4SD5KTV6njJZ9nKe7j3mXecZxiJT2rCcC4VCC0ao2WmXilPqHbXfLzQzaCWUAjFuCi5CDVreibNPMOjmebW/nG/IjUI6ZNglWgW//jo9YW8x/W6mQN1lfyI8rf0xxOGj/fEMV347SWyrbMLo0M6S7Xv/mgufLHELK2EJ5hTdcYKOn9GFKLZJbzV6x39Z4c5BbAYlkVPpDbJ8qgP8OHDO+RjGm0/UBz34cXwaA6RwRTzjRKyfM3Xaftjl3vzkQdzTX3ejChxON2Ie6d89LoFkfU0RZrrZZyF+NUM1Gd64pYNJK/4mACM0W63umS3zz/WiKfeK2S9NeOK88zXX6QZvZelFkchIBlN/pjxy22dSZ+nY284fuYUq8jR7yi4B48bYDjtj7y1fwRS9DLuaqyuHqbQHBJd/Xfc1j5NkG5d1+dJRdFrhlqHYpuljKd/Tr+aXdZ1bMPzn4puFv4DqpI0U2+dvBcAAAAASUVORK5CYII=';

        // ============================================================================
        // ETIQUETA ZEBRA 57 x 31 mm @ 300 dpi (12 dots/mm)
        // ----------------------------------------------------------------------------
        // Tamaño nativo: 684 x 372 dots. Se renderiza a 2x para nitidez.
        // El QR se fija en 24 mm (no ocupa todo el alto) para liberar ancho al
        // texto: la zona de datos pasa de 18.8 mm a 29.4 mm.
        // QR versión 5 (37x37 módulos) -> módulo de 0.65 mm = 7.8 dots @300dpi,
        // casi el doble del mínimo de 4 dots recomendado por Zebra.
        //
        // NOTA: subir de 203 a 300 dpi da MÁS NITIDEZ, no más tamaño. El texto
        // se agrandó explícitamente (~38%) en las constantes T_* de abajo.
        // ============================================================================
        const ETQ_ANCHO_MM = 57;
        const ETQ_ALTO_MM  = 31;
        const ETQ_DPMM     = 12;   // 300 dpi
        const ETQ_ESCALA   = 2;    // supermuestreo
        const ETQ_QR_MM    = 24;   // lado del QR en mm

        const ETQ_W = ETQ_ANCHO_MM * ETQ_DPMM * ETQ_ESCALA;  // 1368
        const ETQ_H = ETQ_ALTO_MM  * ETQ_DPMM * ETQ_ESCALA;  // 744
        const DPMM  = ETQ_DPMM * ETQ_ESCALA;                 // dots por mm en lienzo

        // Reduce el tamaño hasta que el texto quepa; nunca baja del mínimo legible
        const ajustarTexto = (ctx, texto, maxAncho, tamInicial, tamMinimo) => {
            let t = tamInicial;
            while (t > tamMinimo) {
                ctx.font = `bold ${t}px Arial, Helvetica, sans-serif`;
                if (ctx.measureText(texto).width <= maxAncho) return t;
                t -= 1;
            }
            return tamMinimo;
        };

        // Parte el texto en líneas que quepan en maxAncho
        const partirTexto = (ctx, texto, maxAncho) => {
            const palabras = String(texto).split(/\s+/).filter(Boolean);
            const lineas = [];
            let actual = '';
            palabras.forEach(p => {
                const prueba = actual ? actual + ' ' + p : p;
                if (ctx.measureText(prueba).width <= maxAncho) actual = prueba;
                else { if (actual) lineas.push(actual); actual = p; }
            });
            if (actual) lineas.push(actual);
            return lineas;
        };

        /**
         * Dibuja la etiqueta 50x30 mm del equipo y devuelve el dataURL PNG.
         */
        const generarEtiqueta = (equipo) => {
            return new Promise((resolve, reject) => {
                const canvas = document.createElement('canvas');
                canvas.width = ETQ_W; canvas.height = ETQ_H;
                const ctx = canvas.getContext('2d');

                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, ETQ_W, ETQ_H);

                const img = new Image();
                img.onload = () => {
                    const margen = Math.round(1.2 * DPMM);

                    // --- QR cuadrado a la izquierda, centrado verticalmente ---
                    const qrLado = Math.round(ETQ_QR_MM * DPMM);
                    ctx.imageSmoothingEnabled = false;   // bordes limpios
                    ctx.drawImage(img, margen, Math.round((ETQ_H - qrLado) / 2), qrLado, qrLado);
                    ctx.imageSmoothingEnabled = true;

                    // --- Zona de texto a la derecha ---
                    const xIni = margen + qrLado + Math.round(1.5 * DPMM);
                    const aw = ETQ_W - xIni - margen;
                    const cx = xIni + aw / 2;

                    // Tamaños expresados en mm reales de altura de letra.
                    // Aumentados ~38% respecto al formato 50x30 mm.
                    const T_INV = Math.round(3.6 * DPMM);   // número de inventario
                    const T_NOM = Math.round(2.6 * DPMM);   // nombre del equipo
                    const T_CPO = Math.round(2.2 * DPMM);   // marca / modelo / serie
                    const T_MIN = Math.round(1.5 * DPMM);   // piso legible térmico

                    ctx.fillStyle = '#000000';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    const lineas = [];

                    // Nombre: máximo 2 líneas
                    ctx.font = `bold ${T_NOM}px Arial, Helvetica, sans-serif`;
                    partirTexto(ctx, equipo.nombre || '-', aw)
                        .slice(0, 2)
                        .forEach(l => lineas.push({ txt: l, tam: T_NOM }));

                    ctx.font = `bold ${T_CPO}px Arial, Helvetica, sans-serif`;
                    if (equipo.marca) {
                        partirTexto(ctx, equipo.marca, aw).slice(0, 1)
                            .forEach(l => lineas.push({ txt: l, tam: T_CPO }));
                    }
                    if (equipo.modelo) {
                        partirTexto(ctx, 'Mod: ' + equipo.modelo, aw).slice(0, 1)
                            .forEach(l => lineas.push({ txt: l, tam: T_CPO }));
                    }
                    if (equipo.numeroSerie) {
                        lineas.push({ txt: 'N/S: ' + equipo.numeroSerie, tam: T_CPO });
                    }
                    if (equipo.ubicacion) {
                        partirTexto(ctx, equipo.ubicacion, aw).slice(0, 1)
                            .forEach(l => lineas.push({ txt: l, tam: T_CPO }));
                    }

                    const inv = String(equipo.numeroInventario || '');

                    // Escala vertical si el bloque no cabe
                    let total = lineas.reduce((a, l) => a + l.tam * 1.26, 0);
                    if (inv) total += T_INV * 1.32;
                    const disp = ETQ_H - 2 * margen;
                    const esc = total > disp ? disp / total : 1;

                    let y = (ETQ_H - total * esc) / 2;
                    lineas.forEach(l => {
                        const tam = ajustarTexto(ctx, l.txt, aw, Math.round(l.tam * esc), T_MIN);
                        ctx.font = `bold ${tam}px Arial, Helvetica, sans-serif`;
                        ctx.fillText(l.txt, cx, y + l.tam * esc * 0.63);
                        y += l.tam * esc * 1.26;
                    });

                    // Número de inventario destacado al pie
                    if (inv) {
                        const tam = ajustarTexto(ctx, inv, aw, Math.round(T_INV * esc), T_MIN);
                        ctx.font = `bold ${tam}px Arial, Helvetica, sans-serif`;
                        ctx.fillText(inv, cx, y + T_INV * esc * 0.66);
                    }

                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => reject(new Error('No se pudo cargar el código QR.'));
                img.src = QR_BASE64;
            });
        };

        const mxnFormatter = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', minimumFractionDigits: 0, maximumFractionDigits: 0 });

        // ============================================================================
        // [FIX-01] CAPA DE TRANSPORTE JSONP
        // ----------------------------------------------------------------------------
        // Google Apps Script (ContentService) NO devuelve encabezados CORS.
        // Un fetch() normal desde GitHub Pages es bloqueado por el navegador y
        // response.json() lanza excepción -> el inventario quedaba vacío en silencio.
        // JSONP inyecta un <script>, que no está sujeto a la política CORS.
        // ============================================================================
        let __jsonpId = 0;

        const jsonpRequest = (params, timeoutMs = 30000) => {
            return new Promise((resolve, reject) => {
                const cbName = `__cmms_cb_${Date.now()}_${__jsonpId++}`;
                const script = document.createElement('script');
                let terminado = false;

                const limpiar = () => {
                    if (script.parentNode) script.parentNode.removeChild(script);
                    try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
                };

                const temporizador = setTimeout(() => {
                    if (terminado) return;
                    terminado = true; limpiar();
                    reject(new Error('Tiempo de espera agotado. Verifica la URL del Apps Script y que la implementación esté como "Cualquier usuario".'));
                }, timeoutMs);

                window[cbName] = (data) => {
                    if (terminado) return;
                    terminado = true;
                    clearTimeout(temporizador); limpiar();
                    if (data && data.error) reject(new Error(data.error));
                    else resolve(data);
                };

                const qs = new URLSearchParams({ ...params, callback: cbName }).toString();
                script.src = `${GOOGLE_SHEETS_WEBAPP_URL}?${qs}`;
                script.onerror = () => {
                    if (terminado) return;
                    terminado = true;
                    clearTimeout(temporizador); limpiar();
                    reject(new Error('No se pudo contactar el backend. Revisa la URL de implementación.'));
                };
                document.body.appendChild(script);
            });
        };

        // Reintentos con espera progresiva: absorbe cuotas y cortes de red del hospital
        const jsonpConReintentos = async (params, intentos = 3) => {
            let ultimoError;
            for (let i = 0; i < intentos; i++) {
                try {
                    return await jsonpRequest(params);
                } catch (err) {
                    ultimoError = err;
                    if (i < intentos - 1) await new Promise(r => setTimeout(r, 1200 * (i + 1)));
                }
            }
            throw ultimoError;
        };

        const motivosOptions = [
            "PENDIENTE DE CALIBRACION", "EN MANTENIMIENTO PREVENTIVO", "EN REPARACION", 
            "EN ESPERA DE REFACCIONES", "DAÑO SIN POSIBILIDAD DE REPARACION", "PRESTADO", 
            "EN CAMBIO O SUSTITUCION", "BAJA DEFINITIVA"
        ];

        const frecuenciasOptions = [
            { id: '', label: 'No aplica / Sin definir' }, { id: 'M', label: 'M - MENSUAL' }, 
            { id: 'B', label: 'B - BIMESTRAL' }, { id: 'T', label: 'T - TRIMESTRAL' }, 
            { id: 'C', label: 'C - CUATRIMESTRAL' }, { id: 'S', label: 'S - SEMESTRAL' }, 
            { id: 'A', label: 'A - ANUAL' }
        ];

        const mesesAbreviados = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];

        // Función Compartida: Proyectar Meses
        const obtenerMesesProgramados = (ultimoMantenimiento, frecuencia, targetYear) => {
            const mesesProgramados = new Set();
            if (!ultimoMantenimiento || !frecuencia) return mesesProgramados;
            const [uYear, uMonth] = ultimoMantenimiento.split('-').map(Number);
            if (!uYear || !uMonth) return mesesProgramados;

            let interval = frecuencia === 'M'?1 : frecuencia==='B'?2 : frecuencia==='T'?3 : frecuencia==='C'?4 : frecuencia==='S'?6 : frecuencia==='A'?12 : 0;
            if (interval === 0) return mesesProgramados;

            let startMonth = uMonth - 1; 
            let startYear = uYear;
            while (startYear >= targetYear && interval > 0) {
                startMonth -= interval;
                while (startMonth < 0) { startMonth += 12; startYear -= 1; }
            }

            let simMonth = startMonth;
            let simYear = startYear;
            for (let i = 0; i < 100; i++) {
                simMonth += interval;
                while (simMonth > 11) { simMonth -= 12; simYear += 1; }
                if (simYear === targetYear) { mesesProgramados.add(simMonth); }
                else if (simYear > targetYear) { break; }
            }
            return mesesProgramados;
        };

        const calcularProximoMantenimiento = (fechaUltimo, frecuencia) => {
            if (!fechaUltimo || !frecuencia) return '';
            const [yearStr, monthStr] = fechaUltimo.split('-');
            let date = new Date(parseInt(yearStr), parseInt(monthStr) - 1, 1);
            if (isNaN(date.getTime())) return '';
            let meses = frecuencia === 'M'?1 : frecuencia==='B'?2 : frecuencia==='T'?3 : frecuencia==='C'?4 : frecuencia==='S'?6 : frecuencia==='A'?12 : 0;
            date.setMonth(date.getMonth() + meses);
            const m = date.getMonth() + 1;
            return `${date.getFullYear()}-${m < 10 ? '0' : ''}${m}`; 
        };

        // Función Compartida: Limpiar Historial
        const limpiarHistorial = (str) => {
            if (!str) return [];
            return String(str).split(',').map(s => {
                const match = s.match(/(\d{4})-(\d{2})/);
                return match ? match[0] : null;
            }).filter(Boolean);
        };

        // Función Compartida: Verificar Cumplimiento ±1 Mes
        const verificarCumplimiento = (historialEjecuciones, targetMonthIndex, targetYear) => {
            if (!historialEjecuciones) return false;
            const ejecutados = limpiarHistorial(historialEjecuciones);
            const formatYM = (y, m) => `${y}-${(m + 1).toString().padStart(2, '0')}`;
            
            let pMonth = targetMonthIndex - 1, pYear = targetYear;
            if (pMonth < 0) { pMonth = 11; pYear--; }
            
            let nMonth = targetMonthIndex + 1, nYear = targetYear;
            if (nMonth > 11) { nMonth = 0; nYear++; }

            return ejecutados.includes(formatYM(targetYear, targetMonthIndex)) || 
                   ejecutados.includes(formatYM(pYear, pMonth)) || 
                   ejecutados.includes(formatYM(nYear, nMonth));
        };

        // ============================================================================
        // COMPONENTE: DASHBOARD DE INDICADORES (Oscuro)
        // ============================================================================
        const IndicadoresDashboard = ({ equipos }) => {
            const [dataSet, setDataSet] = useState({});
            const [historico, setHistorico] = useState({ meses: [], mp: [], gastoTotal: [] });
            const [currentMonth, setCurrentMonth] = useState('');
            const [isAnnualView, setIsAnnualView] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(false);
            const [dashYear, setDashYear] = useState(new Date().getFullYear()); 

            // Refs para los canvas de Chart.js
            const ratioChartRef = useRef(null);
            const downtimeChartRef = useRef(null);
            const budgetChartRef = useRef(null);
            const trendChartRef = useRef(null);
            const expenseTrendChartRef = useRef(null);
            const chartInstances = useRef({});

            // Cargar Datos desde CSV
            useEffect(() => {
                Papa.parse(GOOGLE_SHEET_CSV_URL, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        procesarDatos(results.data);
                        setIsLoading(false);
                    },
                    error: () => {
                        setError(true);
                        setIsLoading(false);
                    }
                });
            }, []);

            const obtenerMesAnterior = () => {
                const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
                let mesIndex = new Date().getMonth() - 1; 
                if (mesIndex < 0) mesIndex = 11; 
                return meses[mesIndex];
            };

            const procesarDatos = (rows) => {
                let tempDataSet = {}; 
                let histMeses = [], histMP = [], histGasto = [];

                rows.forEach(row => {
                    const mes = String(row.mes || '').trim().toLowerCase();
                    if (!mes) return;
                    const mesFormateado = mes.charAt(0).toUpperCase() + mes.slice(1);

                    if (!tempDataSet[mes]) {
                        const raw = {
                            mp: Number(row.mp_cumplimiento) || 0,
                            mttr: Number(row.mttr) || 0,
                            downReso: Number(row.downtime_resonancia) || 0,
                            downTomo: Number(row.downtime_tomografia) || 0,
                            downHemo: Number(row.downtime_hemodinamia) || 0,
                            downRayos: Number(row.downtime_rayos_x) || 0,
                            presTotalAsig: Number(row.presupuesto_total_asig) || 100,
                            presTotalEjer: Number(row.presupuesto_total_ejer) || 0,
                            presMttoAsig: Number(row.presupuesto_mtto_asig) || 100,
                            presMttoEjer: Number(row.presupuesto_mtto_ejer) || 0,
                            ratioMP: Number(row.ratio_mp) || 0,
                            ratioMC: Number(row.ratio_mc) || 0
                        };

                        histMeses.push(mesFormateado);
                        histMP.push(raw.mp);
                        histGasto.push(raw.presTotalEjer);

                        const totalDowntime = raw.downReso + raw.downTomo + raw.downHemo + raw.downRayos;
                        const pctTotal = (raw.presTotalEjer / raw.presTotalAsig) * 100;
                        const pctMtto = (raw.presMttoEjer / raw.presMttoAsig) * 100;

                        tempDataSet[mes] = {
                            raw,
                            kpis: { mp_cumplimiento: raw.mp, mttr: raw.mttr, downtime: totalDowntime, budget_total: pctTotal, budget_mxn: raw.presTotalEjer },
                            finanzas: { asigTotal: raw.presTotalAsig, ejerTotal: raw.presTotalEjer, asigMtto: raw.presMttoAsig, ejerMtto: raw.presMttoEjer },
                            charts: { ratio_mp: raw.ratioMP, ratio_mc: raw.ratioMC, downtime_equipos: [raw.downReso, raw.downTomo, raw.downHemo, raw.downRayos], budget_pct: [pctTotal, pctMtto] },
                            retos: []
                        };
                    }

                    for (let i = 1; i <= 5; i++) {
                        let titulo = row[`reto${i}_titulo`];
                        let desc = row[`reto${i}_desc`];
                        let tipo = row[`reto${i}_tipo`];

                        if (titulo && String(titulo).trim() !== "") {
                            let tipoClean = String(tipo || 'primary').trim();
                            let iconClass = tipoClean === 'danger' ? 'fa-triangle-exclamation' : (tipoClean === 'warning' ? 'fa-bolt' : (tipoClean === 'success' ? 'fa-check-double' : 'fa-thumbtack'));
                            tempDataSet[mes].retos.push({ tipo: tipoClean, icon: iconClass, titulo: String(titulo).trim(), desc: String(desc || '').trim() });
                        }
                    }
                });

                setDataSet(tempDataSet);
                setHistorico({ meses: histMeses, mp: histMP, gastoTotal: histGasto });

                let keys = Object.keys(tempDataSet);
                if (keys.length > 0) {
                    let mesIdeal = obtenerMesAnterior();
                    setCurrentMonth(tempDataSet[mesIdeal] ? mesIdeal : keys[keys.length - 1]);
                }
            };

            const currentData = useMemo(() => {
                if (Object.keys(dataSet).length === 0) return null;

                if (isAnnualView) {
                    let sumMP = 0, sumMTTR = 0, count = 0, sumDown = [0,0,0,0], sumAsigTotal = 0, sumEjerTotal = 0, sumAsigMtto = 0, sumEjerMtto = 0, sumRatioMP = 0, sumRatioMC = 0;
                    Object.values(dataSet).forEach(d => {
                        let r = d.raw;
                        sumMP += r.mp; sumMTTR += r.mttr;
                        sumDown[0] += r.downReso; sumDown[1] += r.downTomo; sumDown[2] += r.downHemo; sumDown[3] += r.downRayos;
                        sumAsigTotal += r.presTotalAsig; sumEjerTotal += r.presTotalEjer; sumAsigMtto += r.presMttoAsig; sumEjerMtto += r.presMttoEjer;
                        sumRatioMP += r.ratioMP; sumRatioMC += r.ratioMC; count++;
                    });
                    return {
                        isAnnual: true, count,
                        kpis: { mp: (sumMP/count).toFixed(1), mttr: (sumMTTR/count).toFixed(1), downtime: sumDown.reduce((a,b)=>a+b, 0), bgTotal: sumAsigTotal ? ((sumEjerTotal/sumAsigTotal)*100) : 0, bgMxn: sumEjerTotal },
                        finanzas: { asigTotal: sumAsigTotal, ejerTotal: sumEjerTotal, asigMtto: sumAsigMtto, ejerMtto: sumEjerMtto },

                        retos: []

                    if (!currentMonth || !dataSet[currentMonth]) return null;
                    const d = dataSet[currentMonth];
                    return {
                        isAnnual: false,
                        kpis: { mp: d.kpis.mp_cumplimiento, mttr: d.kpis.mttr, downtime: d.kpis.downtime, bgTotal: d.kpis.budget_total, bgMxn: d.kpis.budget_mxn },
                        finanzas: d.finanzas,

                        retos: d.retos

            const monthlyCompliance = useMemo(() => {
                if (!equipos || equipos.length === 0) return [];
                
                return mesesAbreviados.map((nombreMes, monthIndex) => {
                    let programados = 0;
                    let cumplidos = 0;
                    
                    equipos.forEach(equipo => {

                        const mesesProgramados = obtenerMesesProgramados(equipo.ultimoMantenimiento, equipo.frecuenciaMantenimiento, dashYear);
                        
                        if (mesesProgramados.has(monthIndex)) {

                                if (verificarCumplimiento(equipo.historialEjecuciones, monthIndex, dashYear)) {

                                }
                            }
                        }

                    const pct = programados === 0 ? 100 : Math.round((cumplidos / programados) * 100);
                    return { mes: nombreMes, programados, cumplidos, pct };

                        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { suggestedMax: 50, grid: { color: '#1e293b' } }, y: { grid: { display: false } } } }
                    });
                }

                if (budgetChartRef.current) {
                    chartInstances.current.budget = new Chart(budgetChartRef.current, {
                        type: 'bar',
                        data: { labels: ['Total Depto.', 'Refacciones / Mtto.'], datasets: [{ label: '% Ejercido', data: currentData.charts.budget_pct, backgroundColor: currentData.charts.budget_pct.map(v => v > 100 ? '#f43f5e' : '#38bdf8'), borderRadius: 4 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: Math.max(120, ...currentData.charts.budget_pct) + 10, grid: { color: '#1e293b' } }, x: { grid: { display: false } } }, animation: { onComplete: function() { const ctx = this.ctx; const y100 = this.scales.y.getPixelForValue(100); ctx.save(); ctx.beginPath(); ctx.moveTo(this.chartArea.left, y100); ctx.lineTo(this.chartArea.right, y100); ctx.lineWidth = 2; ctx.strokeStyle = '#f43f5e'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.restore(); } } }
                    });
                }

                if (trendChartRef.current) {
                    chartInstances.current.trend = new Chart(trendChartRef.current, {
                        type: 'line',
                        data: {
                            labels: historico.meses,
                            datasets: [{
                                label: '% de Cumplimiento MP', data: historico.mp, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)',
                                borderWidth: 3, pointBackgroundColor: '#0f172a', pointBorderColor: '#38bdf8', pointBorderWidth: 2, pointRadius: 4, fill: true, tension: 0.4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false, callbacks: { label: function(context) { return context.parsed.y + '%'; } } } }, scales: { y: { min: 50, max: 100, grid: { color: '#1e293b' }, ticks: { callback: function(value) { return value + "%"; } } }, x: { grid: { display: false } } } }
                    });
                }

                if (isAnnualView && expenseTrendChartRef.current) {
                    chartInstances.current.expense = new Chart(expenseTrendChartRef.current, {
                        type: 'line',
                        data: {
                            labels: historico.meses,
                            datasets: [{
                                label: 'Gasto Mensual Total (MXN)', data: historico.gastoTotal, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.1)',
                                borderWidth: 3, pointBackgroundColor: '#0f172a', pointBorderColor: '#8b5cf6', pointBorderWidth: 2, pointRadius: 4, fill: true, tension: 0.4
                            }]

                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false, callbacks: { label: function(context) { return mxnFormatter.format(context.parsed.y); } } } }, scales: { y: { beginAtZero: true, grid: { color: '#1e293b' }, ticks: { callback: function(value) { return mxnFormatter.format(value); } } }, x: { grid: { display: false } } } }
                    });

                                <span className={`text-xl ml-2 capitalize ${isAnnualView ? 'text-annual' : 'text-primary'}`}>
                                    ({isAnnualView ? 'Acumulado Anual' : currentMonth})
                                </span>
                            </h1>
                            <p className="text-slate-400 mt-1"><i className="fa-regular fa-hospital mr-2"></i>Hospital San Ángel Inn</p>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3 print-hidden">
                            <button onClick={() => setIsAnnualView(true)} className="bg-annual hover:bg-violet-400 text-white font-bold py-1.5 px-4 rounded-lg transition-colors shadow-[0_0_10px_rgba(139,92,246,0.3)] flex items-center border border-violet-500">
                                <i className="fa-solid fa-chart-line mr-2"></i>Vista Anual
                            </button>
                            <div className="flex items-center gap-2 bg-dark p-1.5 rounded-lg border border-slate-700 shadow-inner">
                                <label className="text-sm font-medium text-slate-300 ml-2"><i className="fa-regular fa-calendar mr-1"></i> Periodo:</label>
                                <select value={isAnnualView ? '' : currentMonth} onChange={(e) => { setIsAnnualView(false); setCurrentMonth(e.target.value); }} className="bg-dark text-white border-none rounded px-3 py-1 outline-none cursor-pointer">
                                    <option value="" disabled>Seleccione...</option>
                                    {Object.keys(dataSet).map(mes => (
                                        <option key={mes} value={mes}>{mes.charAt(0).toUpperCase() + mes.slice(1)}</option>
                                    ))}
                                </select>
                                <button onClick={() => window.print()} className="text-slate-400 hover:text-white px-2 ml-1" title="Imprimir Reporte">
                                    <i className="fa-solid fa-print"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div className="bg-panel p-5 rounded-xl border border-slate-800 flex flex-col justify-between page-break-inside-avoid">
                            <div className="flex justify-between items-start mb-2">
                                <p className="text-slate-400 text-sm font-medium">{isAnnualView ? 'Promedio MP Anual' : 'Cumplimiento MP'}</p>
                                <div className="p-2 bg-slate-800/50 rounded-lg text-primary print-hidden"><i className="fa-solid fa-clipboard-check"></i></div>
                            </div>
                            <div>
                                <h3 className={`text-3xl font-bold ${currentData.kpis.mp >= 95 ? 'text-success' : currentData.kpis.mp >= 85 ? 'text-warning' : 'text-danger'}`}>{currentData.kpis.mp}%</h3>
                                <p className="text-xs text-slate-500 mt-1">Meta: {'>'}95%</p>
                            </div>
                        </div>
                        <div className="bg-panel p-5 rounded-xl border border-slate-800 flex flex-col justify-between page-break-inside-avoid">
                            <div className="flex justify-between items-start mb-2">
                                <p className="text-slate-400 text-sm font-medium">{isAnnualView ? 'Promedio MTTR Anual' : 'MTTR (Mensual)'}</p>
                                <div className="p-2 bg-slate-800/50 rounded-lg text-primary print-hidden"><i className="fa-solid fa-stopwatch"></i></div>
                            </div>
                            <div>
                                <h3 className={`text-3xl font-bold ${currentData.kpis.mttr <= 48 ? 'text-success' : currentData.kpis.mttr <= 72 ? 'text-warning' : 'text-danger'}`}>{currentData.kpis.mttr} <span className="text-lg font-normal text-slate-400">hrs</span></h3>
                                <p className="text-xs text-slate-500 mt-1">Meta: {'<'} 48 hrs</p>
                            </div>
                        </div>
                        <div className="bg-panel p-5 rounded-xl border border-slate-800 flex flex-col justify-between page-break-inside-avoid">

                                <div className="p-2 bg-slate-800/50 rounded-lg text-danger print-hidden"><i className="fa-solid fa-triangle-exclamation"></i></div>
                            </div>
                            <div>
                                <h3 className="text-3xl font-bold text-danger">{currentData.kpis.downtime} <span className="text-lg font-normal text-slate-400">hrs</span></h3>
                                <p className="text-xs text-slate-500 mt-1">Tomo, Hemo, Reso, Rayos X</p>

                        <div className="bg-panel p-5 rounded-xl border border-slate-800 flex flex-col justify-between page-break-inside-avoid">

                            </div>
                            <div className="relative z-10">
                                <div className="flex items-baseline gap-2">
                                    <h3 className={`text-3xl font-bold ${currentData.kpis.bgTotal > 100 ? 'text-danger' : 'text-white'}`}>{Number(currentData.kpis.bgTotal).toFixed(1)}%</h3>
                                    <span className="text-sm font-medium text-slate-300 bg-slate-800/80 px-2 py-0.5 rounded">{mxnFormatter.format(currentData.kpis.bgMxn)}</span>
                                </div>

                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 flex flex-col gap-6">
                            <div className="bg-panel p-6 rounded-xl border border-slate-800 flex flex-col page-break-inside-avoid" style={{minHeight: '20rem'}}>

                            </div>
                            <div className="bg-panel p-6 rounded-xl border border-slate-800 flex flex-col page-break-inside-avoid" style={{minHeight: '20rem'}}>
                                <h3 className="text-white font-semibold mb-1">Evolución de Cumplimiento (Histórico)</h3>
                                <div className="relative flex-grow w-full"><canvas ref={trendChartRef}></canvas></div>
                            </div>
                            {isAnnualView && (
                                <div className="bg-panel p-6 rounded-xl border border-slate-800 flex flex-col page-break-inside-avoid" style={{minHeight: '20rem'}}>

                            <div className="bg-panel p-6 rounded-xl border border-slate-800 flex flex-col page-break-inside-avoid" style={{minHeight: '24rem'}}>

                                        <p className="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-2">Total Depto.</p>
                                        <div className="flex flex-col text-xs gap-1">
                                            <div className="flex justify-between"><span className="text-slate-400">Presupuestado:</span> <span className="text-white font-medium">{mxnFormatter.format(currentData.finanzas.asigTotal)}</span></div>
                                            <div className="flex justify-between"><span className="text-slate-400">Gastado:</span> <span className="text-white font-medium">{mxnFormatter.format(currentData.finanzas.ejerTotal)}</span></div>
                                        </div>

                                    <div className="bg-dark p-3 rounded-lg border border-slate-700/50">
                                        <p className="text-[10px] text-slate-500 uppercase font-bold tracking-wider mb-2">Mantenimiento</p>
                                        <div className="flex flex-col text-xs gap-1">
                                            <div className="flex justify-between"><span className="text-slate-400">Presupuestado:</span> <span className="text-white font-medium">{mxnFormatter.format(currentData.finanzas.asigMtto)}</span></div>
                                            <div className="flex justify-between"><span className="text-slate-400">Gastado:</span> <span className="text-white font-medium">{mxnFormatter.format(currentData.finanzas.ejerMtto)}</span></div>
                                        </div>
                                    </div>

                        <div className="flex flex-col gap-6">

                                    {isAnnualView ? 'Resumen Estratégico' : 'Retos y Hallazgos'}
                                </h3>
                                <div className="flex flex-col gap-3 overflow-y-auto pr-3 flex-grow max-h-[32rem] dark-scroll">
                                    {isAnnualView ? (

                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                            {monthlyCompliance.map(mesData => (
                                <div key={mesData.mes} className={`border rounded-lg p-3 text-center transition-colors ${mesData.programados === 0 ? 'bg-dark border-slate-800 opacity-60' : 'bg-dark border-slate-700 shadow-sm'}`}>
                                    <p className="font-bold text-slate-300">{mesData.mes}</p>
                                    <div className="my-2">
                                        <span className={`text-2xl font-black ${mesData.programados === 0 ? 'text-slate-500' : mesData.pct >= 80 ? 'text-success' : mesData.pct >= 50 ? 'text-warning' : 'text-danger'}`}>
                                            {mesData.programados === 0 ? '-' : `${mesData.pct}%`}
                                        </span>
                                    </div>
                                    <div className="text-xs text-slate-500 flex justify-center gap-2 font-medium">
                                        <span title="Cumplidos" className="text-success font-bold"><i className="fas fa-check"></i> {mesData.cumplidos}</span>
                                        <span title="Programados" className="text-primary font-bold"><i className="fas fa-wrench"></i> {mesData.programados}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <p className="text-xs text-slate-500 mt-4 text-center italic"><i className="fas fa-info-circle"></i> Los equipos "Fuera de Servicio" no penalizan la métrica de Programados.</p>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // LÓGICA PRINCIPAL CMMS (INVENTARIO Y CALENDARIOS)
        // ============================================================================
        const CMMSHospitalario = () => {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [inventarioTab, setInventarioTab] = useState('Propio');
          const [equipos, setEquipos] = useState([]);
          const [isSyncing, setIsSyncing] = useState(false);
          const [syncError, setSyncError] = useState(null);
          const [ultimaSync, setUltimaSync] = useState(null);
          const [bitacora, setBitacora] = useState([]);
          // Técnico responsable: se adjunta a cada folio de bitácora (trazabilidad)
          const [tecnicoActivo, setTecnicoActivo] = useState(() => {
            try { return window.localStorage.getItem('cmms_tecnico') || ''; } catch (e) { return ''; }
          });
          useEffect(() => {
            try { window.localStorage.setItem('cmms_tecnico', tecnicoActivo); } catch (e) {}
          }, [tecnicoActivo]);
          const [showAddEquipo, setShowAddEquipo] = useState(false);
          
          const [searchTerm, setSearchTerm] = useState('');
          const [filterEstatus, setFilterEstatus] = useState('Todos');
          
          // Filtros Calendario
          const [filterUbicacionCal, setFilterUbicacionCal] = useState('Todas');
          const [filterMesCal, setFilterMesCal] = useState('Todos');
          const [searchControlCal, setSearchControlCal] = useState('');
          const [calendarYear, setCalendarYear] = useState(new Date().getFullYear());

          const [selectedEquipo, setSelectedEquipo] = useState(null);
          const [isEditing, setIsEditing] = useState(false);
          const [equipoEditado, setEquipoEditado] = useState(null);
          
          const estadoInicialEquipo = {
            origen: inventarioTab, numero: '', numeroInventario: '', estatus: 'En Servicio', motivoFueraServicio: '', nombre: '', marca: '', polizaMantenimiento: 'NO', modelo: '', numeroSerie: '', fabricante: '', nivelRiesgo: 'I', ubicacion: '', fechaAlta: '', proveedorMantenimiento: '', descripcion: '', tipoTecnologia: 'Equipo Médico', frecuenciaMantenimiento: '', ultimoMantenimiento: '', proximoMantenimiento: '', historialEjecuciones: ''
          };
          const [nuevoEquipo, setNuevoEquipo] = useState(estadoInicialEquipo);

          useEffect(() => { handleSyncSheets(); }, []);

          const equiposFiltrados = useMemo(() => {
            return equipos.filter(e => {
              const matchHoja = e.origen === inventarioTab;
              const matchEstatus = filterEstatus === 'Todos' ||
                (filterEstatus === 'Fuera de Servicio' ? estaFueraServicio(e) : estaEnServicio(e));
              if (!searchTerm) return matchHoja && matchEstatus;
              const s = searchTerm.toLowerCase();
              return matchHoja && matchEstatus && (
                String(e.nombre || '').toLowerCase().includes(s) || String(e.numeroInventario || '').toLowerCase().includes(s) || String(e.marca || '').toLowerCase().includes(s) || String(e.numeroSerie || '').toLowerCase().includes(s)
              );
            });
          }, [equipos, inventarioTab, searchTerm, filterEstatus]);

          const ubicacionesUnicas = useMemo(() => {
              const locs = equipos.filter(e => e.origen === inventarioTab).map(e => e.ubicacion).filter(u => u && u.trim() !== '');
              return ['Todas', ...new Set(locs)].sort();
          }, [equipos, inventarioTab]);

          const equiposCalendario = useMemo(() => {
              return equipos.filter(e => {
                  if (e.origen !== inventarioTab) return false;
                  
                  // FILTRO: Excluir equipos sin frecuencia definida
                  if (!e.frecuenciaMantenimiento || e.frecuenciaMantenimiento === '') return false;
                  
                  // FILTRO: Excluir BAJA DEFINITIVA del calendario
                  if (esBajaDefinitiva(e)) return false;

                  if (filterUbicacionCal !== 'Todas' && e.ubicacion !== filterUbicacionCal) return false;
                  
                  if (searchControlCal) {
                      const s = searchControlCal.toLowerCase();
                      if (!String(e.numeroInventario || '').toLowerCase().includes(s)) return false;
                  }

                  if (filterMesCal !== 'Todos') {
                      const monthIdx = parseInt(filterMesCal, 10);
                      const programados = obtenerMesesProgramados(e.ultimoMantenimiento, e.frecuenciaMantenimiento, calendarYear);
                      if (!programados.has(monthIdx)) return false;
                  }
                  return true;
              });
          }, [equipos, inventarioTab, filterUbicacionCal, filterMesCal, searchControlCal, calendarYear]);

          // [FIX] Sincronización vía JSONP + errores visibles para el usuario
          const handleSyncSheets = async () => {
            setIsSyncing(true);
            setSyncError(null);
            if (!GOOGLE_SHEETS_WEBAPP_URL) {
              setSyncError('No hay URL de backend configurada.');
              setIsSyncing(false);
              return;
            }
            try {
              const data = await jsonpConReintentos({ action: 'getAll' });

              // [FIX-06] Conserva el id real del backend; ya no genera "Propio-undefined"
              const procesarHoja = (arr, origen) => (arr || [])
                .filter(e => e.numeroInventario || e.nombre)
                .map(e => ({
                  ...e,
                  origen,
                  id: e.id ? String(e.id) : `${origen}-FILA-${e._fila}`
                }));

              const consolidado = [
                ...procesarHoja(data.propio, 'Propio'),
                ...procesarHoja(data.comodato, 'Comodato'),
                ...procesarHoja(data.renta, 'Renta')
              ];

              setEquipos(consolidado);
              setBitacora(data.bitacora || []);
              setUltimaSync(data.sincronizado || new Date().toLocaleString('es-MX'));

              if (consolidado.length === 0) {
                setSyncError('El backend respondió correctamente, pero no devolvió equipos. Verifica los nombres de las hojas (Propio, Comodato, Renta) y que tengan datos.');
              }
            } catch (error) {
              console.error(error);
              setSyncError(error.message || 'Error desconocido al sincronizar.');
            } finally {
              setIsSyncing(false);
            }
          };

          // [FIX] Guardado confirmado: si falla, revierte el estado local
          const directSaveToSheets = async (equipo, estadoPrevio) => {
            if (!GOOGLE_SHEETS_WEBAPP_URL) return false;
            setIsSyncing(true);
            setSyncError(null);
            try {
              await jsonpConReintentos({
                action: 'save',
                payload: JSON.stringify({
                  action: 'edit',
                  data: equipo,
                  sheetName: equipo.origen,
                  originalInventario: equipo.numeroInventario,
                  fila: equipo._fila
                })
              });
              setUltimaSync(new Date().toLocaleString('es-MX'));
              return true;
            } catch (error) {
              console.error(error);
              setSyncError('No se guardó en Google Sheets: ' + error.message);
              // Revierte para que la pantalla no muestre datos que no se persistieron
              if (estadoPrevio) setEquipos(estadoPrevio);
              return false;
            } finally {
              setIsSyncing(false);
            }
          };

          const handleUpdateEquipo = async (e) => {
            e.preventDefault();
            const estadoPrevio = equipos;
            setEquipos(equipos.map(eq => eq.id === equipoEditado.id ? equipoEditado : eq));
            setSelectedEquipo(equipoEditado);
            setIsEditing(false);
            await directSaveToSheets(equipoEditado, estadoPrevio);
          };

          const handleAddEquipo = async (e) => {
            e.preventDefault();

            // Validación previa: evita altas incompletas en el inventario
            if (!nuevoEquipo.numeroInventario || !nuevoEquipo.nombre) {
              setSyncError('El número de inventario y el nombre del equipo son obligatorios.');
              return;
            }
            const duplicado = equipos.some(eq =>
              eq.origen === nuevoEquipo.origen &&
              String(eq.numeroInventario).trim() === String(nuevoEquipo.numeroInventario).trim()
            );
            if (duplicado) {
              setSyncError(`El número de inventario ${nuevoEquipo.numeroInventario} ya existe en ${nuevoEquipo.origen}.`);
              return;
            }

            const id = `INV-${nuevoEquipo.numeroInventario}`;
            const numero = equipos.length > 0 ? Math.max(...equipos.map(eq => Number(eq.numero) || 0)) + 1 : 1;
            const equipoGuardar = { ...nuevoEquipo, id, numero };

            setIsSyncing(true);
            setSyncError(null);
            try {
              await jsonpConReintentos({
                action: 'save',
                payload: JSON.stringify({ action: 'add', data: equipoGuardar, sheetName: equipoGuardar.origen })
              });
              setEquipos([...equipos, equipoGuardar]);
              setShowAddEquipo(false);
              setNuevoEquipo(estadoInicialEquipo);
              setUltimaSync(new Date().toLocaleString('es-MX'));
            } catch (error) {
              setSyncError('No se pudo dar de alta el equipo: ' + error.message);
            } finally {
              setIsSyncing(false);
            }
          };

          const toggleMantenimientoEjecutado = (equipo, monthIndex, year) => {
              const strY = year.toString();
              const strM = (monthIndex + 1).toString().padStart(2, '0');
              const targetStr = `${strY}-${strM}`;

              let historialArr = limpiarHistorial(equipo.historialEjecuciones);
              if (historialArr.includes(targetStr)) { historialArr = historialArr.filter(h => h !== targetStr); } 
              else { historialArr.push(targetStr); }
              historialArr = [...new Set(historialArr)];

              const ejecutando = historialArr.includes(targetStr);
              const updatedEquipo = { ...equipo, historialEjecuciones: historialArr.join(',') };
              const estadoPrevio = equipos;
              setEquipos(equipos.map(eq => eq.id === updatedEquipo.id ? updatedEquipo : eq));

              directSaveToSheets(updatedEquipo, estadoPrevio).then(ok => {
                // [NEW-07] Al marcar ejecutado, levanta folio en bitácora
                if (ok && ejecutando) {
                  jsonpConReintentos({
                    action: 'save',
                    payload: JSON.stringify({
                      action: 'bitacora',
                      data: {
                        numeroInventario: equipo.numeroInventario,
                        nombreEquipo: equipo.nombre,
                        origen: equipo.origen,
                        ubicacion: equipo.ubicacion,
                        tipo: 'MP',
                        periodo: targetStr,
                        tecnico: tecnicoActivo || 'No especificado',
                        estatusFinal: 'Concluido'
                      }
                    })
                  }).catch(err => console.error('Bitácora:', err));
                }
              });
          };

          const getEstatusColor = (estatus) => {
            const status = estatus ? estatus.toLowerCase() : '';
            if (status.includes('servicio') && !status.includes('fuera')) return 'bg-emerald-100 text-emerald-800 border-emerald-300';
            if (status.includes('fuera de servicio')) return 'bg-red-100 text-red-800 border-red-300';
            return 'bg-gray-100 text-gray-800 border-gray-300'; 
          };

          // ============================================================================
          // ETIQUETA DE IDENTIFICACIÓN DEL EQUIPO
          // Vista previa + descarga PNG + impresión directa
          // ============================================================================
          const EtiquetaEquipo = ({ equipo }) => {
            const [imgUrl, setImgUrl] = useState(null);
            const [errorEtiqueta, setErrorEtiqueta] = useState(null);

            useEffect(() => {
              let vigente = true;
              setImgUrl(null);
              setErrorEtiqueta(null);
              generarEtiqueta(equipo)
                .then(url => { if (vigente) setImgUrl(url); })
                .catch(err => { if (vigente) setErrorEtiqueta(err.message); });
              return () => { vigente = false; };
            }, [equipo.id, equipo.nombre, equipo.marca, equipo.modelo,
                equipo.numeroSerie, equipo.ubicacion, equipo.numeroInventario]);

            const nombreArchivo = () => {
              const inv = String(equipo.numeroInventario || 'SIN-INV')
                .replace(/[^A-Za-z0-9_-]/g, '');
              return `Etiqueta_${inv}.png`;
            };

            const descargar = () => {
              if (!imgUrl) return;
              const a = document.createElement('a');
              a.href = imgUrl;
              a.download = nombreArchivo();
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            };

            const imprimir = () => {
              if (!imgUrl) return;
              const v = window.open('', '_blank', 'width=900,height=600');
              if (!v) {
                setErrorEtiqueta('El navegador bloqueó la ventana emergente. Permite las ventanas emergentes para imprimir.');
                return;
              }
              // Tamaño físico exacto: la Zebra debe recibir 50x30 mm, sin
              // reescalado del navegador. margin:0 + size fijo evita que el
              // driver aplique "ajustar a página" y deforme la etiqueta.
              v.document.write(
                '<html><head><title>' + nombreArchivo() + '</title>' +
                '<style>' +
                '@page{size:' + ETQ_ANCHO_MM + 'mm ' + ETQ_ALTO_MM + 'mm;margin:0}' +
                'html,body{margin:0;padding:0}' +
                'img{width:' + ETQ_ANCHO_MM + 'mm;height:' + ETQ_ALTO_MM + 'mm;display:block;' +
                'image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges}' +
                '</style></head><body>' +
                '<img src="' + imgUrl + '" onload="window.focus();window.print();window.close();">' +
                '</body></html>'
              );
              v.document.close();
            };

            return (
              <div>
                <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
                  <p className="text-xs text-gray-400 font-bold uppercase tracking-wider">
                    <i className="fas fa-tag mr-2"></i>Etiqueta de Identificación
                    <span className="ml-2 text-[10px] normal-case font-medium text-gray-400">
                      {ETQ_ANCHO_MM} × {ETQ_ALTO_MM} mm · Zebra 300 dpi
                    </span>
                  </p>
                  <div className="flex flex-wrap gap-2 print-hidden">
                    <button onClick={descargar} disabled={!imgUrl}
                      className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition shadow-sm font-medium text-sm disabled:opacity-40 disabled:cursor-not-allowed">
                      <i className="fas fa-download"></i> Descargar PNG
                    </button>
                    <button onClick={imprimir} disabled={!imgUrl}
                      className="flex items-center gap-2 bg-slate-700 text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition shadow-sm font-medium text-sm disabled:opacity-40 disabled:cursor-not-allowed">
                      <i className="fas fa-print"></i> Imprimir
                    </button>
                  </div>
                </div>

                {errorEtiqueta && (
                  <div className="bg-red-50 border-l-4 border-red-500 p-3 rounded-lg text-sm text-red-700">
                    {errorEtiqueta}
                  </div>
                )}

                <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 flex justify-center shadow-inner">
                  {imgUrl ? (
                    <img src={imgUrl} alt={'Etiqueta ' + (equipo.numeroInventario || '')}
                      className="h-auto rounded shadow-md border border-gray-300 bg-white"
                      style={{ width: '380px', maxWidth: '100%' }} />
                  ) : !errorEtiqueta ? (
                    <div className="py-12 text-gray-400 text-sm flex items-center gap-2">
                      <i className="fas fa-circle-notch fa-spin"></i> Generando etiqueta...
                    </div>
                  ) : null}
                </div>

                <p className="text-[11px] text-gray-400 mt-2 text-center">
                  El código QR dirige a la base de datos de equipos del CMMS.
                  Al imprimir, configura el driver Zebra en <strong>100% de escala</strong> (sin «ajustar a página»).
                </p>
              </div>
            );
          };

          // Banner de diagnóstico: los fallos ya no son silenciosos
          const BannerEstado = () => {
            if (syncError) {
              return (
                <div className="print-hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-lg flex items-start gap-3">
                  <i className="fas fa-triangle-exclamation text-red-600 mt-1"></i>
                  <div className="flex-1">
                    <p className="font-bold text-red-800 text-sm">Error de sincronización</p>
                    <p className="text-red-700 text-sm mt-1">{syncError}</p>
                  </div>
                  <button onClick={handleSyncSheets} className="text-sm bg-red-600 text-white px-3 py-1.5 rounded-lg hover:bg-red-700 font-medium whitespace-nowrap">Reintentar</button>
                </div>
              );
            }
            if (equipos.length > 0) {
              return (
                <div className="print-hidden bg-emerald-50 border-l-4 border-emerald-500 p-3 rounded-lg flex items-center gap-3 text-sm">
                  <i className="fas fa-circle-check text-emerald-600"></i>
                  <span className="text-emerald-800 font-medium">
                    {equipos.length} equipos sincronizados{ultimaSync ? ` · ${ultimaSync}` : ''}
                  </span>
                </div>
              );
            }
            return null;
          };

          const renderCalendarios = () => (
              <div className="space-y-6 animate-in fade-in duration-300 text-slate-800">
                  <BannerEstado />
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 print-hidden">
                      <h2 className="text-2xl font-bold flex items-center gap-2">
                        <i className="far fa-calendar-alt text-blue-600"></i> Calendario de Mantenimiento Preventivo
                      </h2>
                      <div className="flex gap-2">
                          <button onClick={() => window.print()} className="flex items-center gap-2 bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition shadow-sm font-medium text-sm">
                            <i className="fas fa-print"></i> Imprimir
                          </button>
                          <button onClick={handleSyncSheets} disabled={isSyncing} className="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition shadow-sm font-medium text-sm">
                            <i className={`fas fa-sync-alt ${isSyncing ? "fa-spin" : ""}`}></i> {isSyncing ? 'Sincronizando...' : 'Sincronizar Sheets'}
                          </button>
                      </div>
                  </div>

                  <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden" id="area-impresion">
                      <div className="flex border-b border-gray-100 bg-gray-50/50 overflow-x-auto print-hidden">
                        <button onClick={() => setInventarioTab('Propio')} className={`flex-1 py-3 px-4 text-sm font-medium transition-colors border-b-2 whitespace-nowrap ${inventarioTab === 'Propio' ? 'border-blue-600 text-blue-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>Hoja 1: Equipo Propio</button>
                        <button onClick={() => setInventarioTab('Comodato')} className={`flex-1 py-3 px-4 text-sm font-medium transition-colors border-b-2 whitespace-nowrap ${inventarioTab === 'Comodato' ? 'border-purple-600 text-purple-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>Hoja 2: Comodato</button>
                        <button onClick={() => setInventarioTab('Renta')} className={`flex-1 py-3 px-4 text-sm font-medium transition-colors border-b-2 whitespace-nowrap ${inventarioTab === 'Renta' ? 'border-amber-600 text-amber-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}>Hoja 3: Renta</button>
                      </div>

                      <div className="p-4 border-b border-gray-100 bg-white flex flex-wrap items-center gap-4 print-hidden">
                          <div className="flex items-center gap-2 flex-1 min-w-[200px]">
                              <label className="text-xs font-bold text-gray-500 uppercase"><i className="fas fa-search mr-1"></i> Control:</label>
                              <input type="text" value={searchControlCal} onChange={(e) => setSearchControlCal(e.target.value)} placeholder="Buscar No. Control..." className="w-full py-2 px-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500 font-medium" />
                          </div>
                          <div className="flex items-center gap-2 flex-1 min-w-[200px]">
                              <label className="text-xs font-bold text-gray-500 uppercase"><i className="fas fa-map-marker-alt mr-1"></i> Área:</label>
                              <select value={filterUbicacionCal} onChange={(e) => setFilterUbicacionCal(e.target.value)} className="w-full py-2 px-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                                  {ubicacionesUnicas.map(ub => <option key={ub} value={ub}>{ub}</option>)}
                              </select>
                          </div>
                          <div className="flex items-center gap-2 flex-1 min-w-[150px]">
                              <label className="text-xs font-bold text-gray-500 uppercase"><i className="fas fa-filter mr-1"></i> Mes:</label>
                              <select value={filterMesCal} onChange={(e) => setFilterMesCal(e.target.value)} className="w-full py-2 px-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                                  <option value="Todos">Todos los meses</option>
                                  {mesesAbreviados.map((m, i) => <option key={i} value={i}>{m}</option>)}
                              </select>
                          </div>
                          <div className="flex items-center gap-2">
                              <label className="text-xs font-bold text-gray-500 uppercase">Año:</label>
                              <input type="number" value={calendarYear} onChange={(e) => setCalendarYear(parseInt(e.target.value))} className="w-24 py-2 px-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none text-center font-bold" />
                          </div>
                      </div>

                      <div className="hidden print-block p-6 text-center border-b border-gray-200 text-slate-800">
                          <h2 className="text-3xl font-bold mb-2">Calendario de Mantenimiento Preventivo</h2>
                          <p className="text-lg">
                              Año: <strong>{calendarYear}</strong> | Categoría: <strong>{inventarioTab}</strong> | Área: <strong>{filterUbicacionCal}</strong>
                              {filterMesCal !== 'Todos' && <span> | Mes Programado: <strong>{mesesAbreviados[parseInt(filterMesCal)]}</strong></span>}
                          </p>
                      </div>

                      <div className="overflow-x-auto p-4">
                          <table className="w-full text-left border-collapse tabla-cal text-xs whitespace-nowrap text-slate-800">
                              <thead>
                                  <tr>
                                      <th className="p-2 w-24">Control</th>
                                      <th className="p-2">Equipo</th>
                                      <th className="p-2">Marca</th>
                                      <th className="p-2">Modelo</th>
                                      <th className="p-2">Serie</th>
                                      <th className="p-2">Ubicación</th>
                                      {mesesAbreviados.map(mes => <th key={mes} className="p-1 w-8 uppercase" style={{writingMode: 'vertical-rl', transform: 'rotate(180deg)', paddingBottom: '10px'}}>{mes}</th>)}
                                  </tr>
                              </thead>
                              <tbody>
                                  {equiposCalendario.length === 0 ? (
