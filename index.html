<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCMMS - Mantenimiento</title>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50">
    <div id="root"></div>

     <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ============================================================================
        // CONFIGURACIÓN DE GOOGLE SHEETS
        // ============================================================================
        const GOOGLE_SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwsPJJ9SQdgz3l8BEDMwpcOT0hYhrfLL3qIdTAYJ7q_Pji5ZBzu_Pt-zmvqcmtokVKi/exec"; 

        const motivosOptions = [
            "PENDIENTE DE CALIBRACION",
            "EN MANTENIMIENTO PREVENTIVO",
            "EN REPARACION",
            "EN ESPERA DE REFACCIONES",
            "DAÑO SIN POSIBILIDAD DE REPARACION",
            "PRESTADO",
            "EN CAMBIO O SUSTITUCION",
            "BAJA DEFINITIVA"
        ];

        const frecuenciasOptions = [
            { id: '', label: 'No aplica / Sin definir' },
            { id: 'M', label: 'M - MENSUAL' },
            { id: 'B', label: 'B - BIMESTRAL' },
            { id: 'T', label: 'T - TRIMESTRAL' },
            { id: 'C', label: 'C - CUATRIMESTRAL' },
            { id: 'S', label: 'S - SEMESTRAL' },
            { id: 'A', label: 'A - ANUAL' }
        ];

        // Función para calcular el próximo mes/año
        const calcularProximoMantenimiento = (fechaUltimo, frecuencia) => {
            if (!fechaUltimo || !frecuencia) return '';
            
            // fechaUltimo viene en formato "YYYY-MM"
            const [yearStr, monthStr] = fechaUltimo.split('-');
            let date = new Date(parseInt(yearStr), parseInt(monthStr) - 1, 1);
            
            if (isNaN(date.getTime())) return '';
            
            let meses = 0;
            switch(frecuencia) {
                case 'M': meses = 1; break;
                case 'B': meses = 2; break;
                case 'T': meses = 3; break;
                case 'C': meses = 4; break;
                case 'S': meses = 6; break;
                case 'A': meses = 12; break;
            }
            
            date.setMonth(date.getMonth() + meses);
            const m = date.getMonth() + 1;
            const y = date.getFullYear();
            return `${y}-${m < 10 ? '0' : ''}${m}`; // Retorna YYYY-MM
        };

        const CMMSHospitalario = () => {
          const [activeTab, setActiveTab] = useState('equipos');
          const [inventarioTab, setInventarioTab] = useState('Propio');
          const [equipos, setEquipos] = useState([]);
          const [isSyncing, setIsSyncing] = useState(false);
          const [showAddEquipo, setShowAddEquipo] = useState(false);
          
          // Estados de Filtros
          const [searchTerm, setSearchTerm] = useState('');
          const [filterEstatus, setFilterEstatus] = useState('Todos');

          // Estados para la vista de detalle y edición
          const [selectedEquipo, setSelectedEquipo] = useState(null);
          const [isEditing, setIsEditing] = useState(false);
          const [equipoEditado, setEquipoEditado] = useState(null);
          
          const estadoInicialEquipo = {
            origen: inventarioTab, numero: '', numeroInventario: '', estatus: 'En Servicio',
            motivoFueraServicio: '', nombre: '', marca: '', polizaMantenimiento: 'No', modelo: '',
            numeroSerie: '', fabricante: '', nivelRiesgo: 'I', ubicacion: '', fechaAlta: '',
            proveedorMantenimiento: '', descripcion: '', tipoTecnologia: 'Equipo Médico',
            frecuenciaMantenimiento: '', ultimoMantenimiento: '', proximoMantenimiento: ''
          };
          const [nuevoEquipo, setNuevoEquipo] = useState(estadoInicialEquipo);

          // Cargar datos automáticamente al abrir la página
          useEffect(() => {
            handleSyncSheets();
          }, []);

          const stats = useMemo(() => {
            return {
              total: equipos.length,
              propios: equipos.filter(e => e.origen === 'Propio').length,
              comodato: equipos.filter(e => e.origen === 'Comodato').length,
              renta: equipos.filter(e => e.origen === 'Renta').length,
              criticos: equipos.filter(e => e.estatus === 'Fuera de Servicio').length,
            };
          }, [equipos]);

          // Lógica avanzada de búsqueda
          const equiposFiltrados = useMemo(() => {
            return equipos.filter(e => {
              const matchHoja = e.origen === inventarioTab;
              const matchEstatus = filterEstatus === 'Todos' || e.estatus === filterEstatus;
              
              if (!searchTerm) return matchHoja && matchEstatus;

              const s = searchTerm.toLowerCase();
              const matchSearch = 
                String(e.nombre || '').toLowerCase().includes(s) ||
                String(e.numeroInventario || '').toLowerCase().includes(s) ||
                String(e.marca || '').toLowerCase().includes(s) ||
                String(e.modelo || '').toLowerCase().includes(s) ||
                String(e.numeroSerie || '').toLowerCase().includes(s);

              return matchHoja && matchEstatus && matchSearch;
            });
          }, [equipos, inventarioTab, searchTerm, filterEstatus]);

          const handleSyncSheets = async () => {
            setIsSyncing(true);
            if (!GOOGLE_SHEETS_WEBAPP_URL) {
              setTimeout(() => setIsSyncing(false), 1000);
              return;
            }

            try {
              const response = await fetch(`${GOOGLE_SHEETS_WEBAPP_URL}?action=getAll`);
              const data = await response.json();
              
              const equiposSheets = [
                ...data.propio.map(e => ({...e, origen: 'Propio'})),
                ...data.comodato.map(e => ({...e, origen: 'Comodato'})),
                ...data.renta.map(e => ({...e, origen: 'Renta'})),
              ];
              setEquipos(equiposSheets);
            } catch (error) {
              console.error("Error al sincronizar con Sheets:", error);
            } finally {
              setIsSyncing(false);
            }
          };

          const handleAddEquipo = async (e) => {
            e.preventDefault();
            const id = equipos.length > 0 ? Math.max(...equipos.map(eq => eq.id || 0)) + 1 : 1;
            const numero = equipos.length > 0 ? Math.max(...equipos.map(eq => Number(eq.numero) || 0)) + 1 : 1;
            
            const equipoGuardar = { ...nuevoEquipo, id, numero };
            
            if (GOOGLE_SHEETS_WEBAPP_URL) {
              try {
                setIsSyncing(true);
                await fetch(GOOGLE_SHEETS_WEBAPP_URL, {
                  method: 'POST',
                  body: JSON.stringify({ action: 'add', data: equipoGuardar, sheetName: equipoGuardar.origen })
                });
              } catch (error) {
                console.error("Error al guardar en Sheets:", error);
              } finally {
                setIsSyncing(false);
              }
            }

            setEquipos([...equipos, equipoGuardar]);
            setShowAddEquipo(false);
            setNuevoEquipo(estadoInicialEquipo);
          };

          const handleUpdateEquipo = async (e) => {
            e.preventDefault();
            setEquipos(equipos.map(eq => eq.id === equipoEditado.id ? equipoEditado : eq));
            setSelectedEquipo(equipoEditado);
            setIsEditing(false);

            if (GOOGLE_SHEETS_WEBAPP_URL) {
              try {
                setIsSyncing(true);
                await fetch(GOOGLE_SHEETS_WEBAPP_URL, {
                  method: 'POST',
                  body: JSON.stringify({ 
                    action: 'edit', 
                    data: equipoEditado, 
                    sheetName: equipoEditado.origen, 
                    id: equipoEditado.id,
                    originalInventario: selectedEquipo.numeroInventario 
                  })
                });
              } catch (error) {
                console.error("Error al actualizar en Sheets:", error);
              } finally {
                setIsSyncing(false);
              }
            }
          };

          const directSaveToSheets = async (equipo) => {
             if (GOOGLE_SHEETS_WEBAPP_URL) {
              try {
                setIsSyncing(true);
                await fetch(GOOGLE_SHEETS_WEBAPP_URL, {
                  method: 'POST',
                  body: JSON.stringify({ action: 'edit', data: equipo, sheetName: equipo.origen, id: equipo.id, originalInventario: equipo.numeroInventario })
                });
              } catch (error) {
                console.error(error);
              } finally {
                setIsSyncing(false);
              }
            }
          };

          const handleQuickStatusChange = (newStatus) => {
            const updatedEquipo = { ...selectedEquipo, estatus: newStatus };
            if (newStatus === 'En Servicio') {
                updatedEquipo.motivoFueraServicio = '';
            } else if (!updatedEquipo.motivoFueraServicio) {
                updatedEquipo.motivoFueraServicio = motivosOptions[0];
            }
            setSelectedEquipo(updatedEquipo);
            setEquipos(equipos.map(eq => eq.id === updatedEquipo.id ? updatedEquipo : eq));
            directSaveToSheets(updatedEquipo);
          };

          const handleQuickMotivoChange = (newMotivo) => {
            const updatedEquipo = { ...selectedEquipo, motivoFueraServicio: newMotivo };
            setSelectedEquipo(updatedEquipo);
            setEquipos(equipos.map(eq => eq.id === updatedEquipo.id ? updatedEquipo : eq));
            directSaveToSheets(updatedEquipo);
          };

          // Funciones para manejar cambios en Mantenimiento Preventivo
          const handleNewEquipoMantenimientoChange = (field, value) => {
              const updated = { ...nuevoEquipo, [field]: value };
              updated.proximoMantenimiento = calcularProximoMantenimiento(updated.ultimoMantenimiento, updated.frecuenciaMantenimiento);
              setNuevoEquipo(updated);
          };

          const handleEditEquipoMantenimientoChange = (field, value) => {
              const updated = { ...equipoEditado, [field]: value };
              updated.proximoMantenimiento = calcularProximoMantenimiento(updated.ultimoMantenimiento, updated.frecuenciaMantenimiento);
              setEquipoEditado(updated);
          };

          const getEstatusColor = (estatus) => {
            const status = estatus ? estatus.toLowerCase() : '';
            if (status.includes('servicio') && !status.includes('fuera')) {
              return 'bg-emerald-100 text-emerald-800 border-emerald-300';
            } else if (status.includes('fuera de servicio')) {
              return 'bg-red-100 text-red-800 border-red-300';
            }
            return 'bg-gray-100 text-gray-800 border-gray-300'; 
          };

          const renderDashboard = () => (
            <div className="space-y-6 animate-in fade-in duration-300">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                  <i className="fas fa-chart-line text-blue-600"></i> Panel de Control
                </h2>
                <button onClick={handleSyncSheets} disabled={isSyncing} className="flex items-center gap-2 bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg hover:bg-emerald-200 transition font-medium text-sm">
                  <i className={`fas fa-sync-alt ${isSyncing ? "fa-spin" : ""}`}></i>
                  {isSyncing ? 'Sincronizando Sheets...' : 'Sincronizar Sheets'}
                </button>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500 font-medium">Equipo Propio</p>
                    <p className="text-3xl font-bold text-blue-600">{stats.propios}</p>
                  </div>
                  <div className="bg-blue-100 p-3 rounded-lg text-blue-600"><i className="fas fa-database text-2xl"></i></div>
                </div>
                
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500 font-medium">En Comodato</p>
                    <p className="text-3xl font-bold text-purple-600">{stats.comodato}</p>
                  </div>
                  <div className="bg-purple-100 p-3 rounded-lg text-purple-600"><i className="fas fa-server text-2xl"></i></div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500 font-medium">En Renta</p>
                    <p className="text-3xl font-bold text-amber-500">{stats.renta}</p>
                  </div>
                  <div className="bg-amber-100 p-3 rounded-lg text-amber-600"><i className="fas fa-heartbeat text-2xl"></i></div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500 font-medium">Fuera de Servicio</p>
                    <p className="text-3xl font-bold text-red-500">{stats.criticos}</p>
                  </div>
                  <div className="bg-red-100 p-3 rounded-lg text-red-600"><i className="fas fa-exclamation-triangle text-2xl"></i></div>
                </div>
              </div>
            </div>
          );

          const renderEquipos = () => {
            if (selectedEquipo && isEditing) {
              return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                  <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <div className="flex items-center gap-3">
                      <button onClick={() => setIsEditing(false)} className="text-gray-500 hover:text-blue-600 transition">
                        <i className="fas fa-arrow-left text-xl"></i>
                      </button>
                      <h2 className="text-xl font-bold text-gray-800">Editar Equipo: {equipoEditado.numeroInventario}</h2>
                    </div>
                  </div>
                  
                  <form onSubmit={handleUpdateEquipo} className="p-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">Núm. de Inventario Interno *</label>
                        <input required type="text" value={equipoEditado.numeroInventario} onChange={(e) => setEquipoEditado({...equipoEditado, numeroInventario: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
                      </div>
                      <div className="lg:col-span-2">
                        <label className="block text-xs font-bold text-gray-700 mb-1">Nombre del Equipo o Tecnología *</label>
                        <input required type="text" value={equipoEditado.nombre} onChange={(e) => setEquipoEditado({...equipoEditado, nombre: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">¿Equipo o Tecnología?</label>
                        <select value={equipoEditado.tipoTecnologia} onChange={(e) => setEquipoEditado({...equipoEditado, tipoTecnologia: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
                          <option value="Equipo Médico">Equipo Médico</option>
                          <option value="Tecnología de Apoyo">Tecnología de Apoyo / Software</option>
                          <option value="Infraestructura">Infraestructura</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-gray-700 mb-1">Estatus *</label>
                        <select required value={equipoEditado.estatus} onChange={(e) => setEquipoEditado({...equipoEditado, estatus: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
                          <option value="En Servicio">En Servicio</option>
                          <option value="Fuera de Servicio">Fuera de Servicio</option>
                        </select>
                      </div>
                      {equipoEditado.estatus === 'Fuera de Servicio' && (
                        <div className="lg:col-span-3 bg-red-50 p-3 rounded-lg border border-red-200 mb-2">
                          <label className="block text-xs font-bold text-red-600 mb-1">Seleccione el motivo de "Fuera de Servicio"</label>
                          <select value={equipoEditado.motivoFueraServicio} onChange={(e) => setEquipoEditado({...equipoEditado, motivoFueraServicio: e.target.value})} className="w-full md:w-1/2 px-3 py-2 border border-red-300 rounded-lg text-sm bg-white text-red-800 font-medium">
                            {motivosOptions.map(m => <option key={m} value={m}>{m}</option>)}
                          </select>
                        </div>
                      )}
                      
                      <div className="lg:col-span-3 border-t border-gray-200 my-2 pt-4">
                          <h4 className="text-sm font-bold text-gray-800 mb-3"><i className="fas fa-wrench mr-2 text-blue-500"></i>Configuración de Mantenimiento Preventivo</h4>
                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                              <div>
                                  <label className="block text-xs font-bold text-gray-700 mb-1">Frecuencia</label>
                                  <select value={equipoEditado.frecuenciaMantenimiento} onChange={(e) => handleEditEquipoMantenimientoChange('frecuenciaMantenimiento', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
                                    {frecuenciasOptions.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
                                  </select>
                              </div>
                              <div>
                                  <label className="block text-xs font-bold text-gray-700 mb-1">Mes/Año del Último Servicio</label>
                                  <input type="month" value={equipoEditado.ultimoMantenimiento} onChange={(e) => handleEditEquipoMantenimientoChange('ultimoMantenimiento', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
                              </div>
                              <div>
                                  <label className="block text-xs font-bold text-gray-700 mb-1">Mes/Año Próximo (Calculado)</label>
                                  <input type="month" value={equipoEditado.proximoMantenimiento} readOnly className="w-full px-3 py-2 border border-blue-200 bg-blue-50 text-blue-800 font-bold rounded-lg text-sm cursor-not-allowed" />
                              </div>
                          </div>
                      </div>

                      <div><label className="block text-xs font-medium text-gray-700 mb-1">Marca</label><input type="text" value={equipoEditado.marca} onChange={(e) => setEquipoEditado({...equipoEditado, marca: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                      <div><label className="block text-xs font-medium text-gray-700 mb-1">Modelo o Versión</label><input type="text" value={equipoEditado.modelo} onChange={(e) => setEquipoEditado({...equipoEditado, modelo: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                      <div><label className="block text-xs font-medium text-gray-700 mb-1">Número de Serie</label><input type="text" value={equipoEditado.numeroSerie} onChange={(e) => setEquipoEditado({...equipoEditado, numeroSerie: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                      <div><label className="block text-xs font-medium text-gray-700 mb-1">Fabricante</label><input type="text" value={equipoEditado.fabricante} onChange={(e) => setEquipoEditado({...equipoEditado, fabricante: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                      <div><label className="block text-xs font-bold text-gray-700 mb-1">Ubicación Física *</label><input required type="text" value={equipoEditado.ubicacion} onChange={(e) => setEquipoEditado({...equipoEditado, ubicacion: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">¿Póliza Preventivo Vigente?</label>
                        <select value={equipoEditado.polizaMantenimiento} onChange={(e) => setEquipoEditado({...equipoEditado, polizaMantenimiento: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
                          <option value="Sí">Sí</option><option value="No">No</option>
                        </select>
                      </div>
                      <div><label className="block text-xs font-medium text-gray-700 mb-1">Nivel de Riesgo</label><input type="text" value={equipoEditado.nivelRiesgo} onChange={(e) => setEquipoEditado({...equipoEditado, nivelRiesgo: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                      <div><label className="block text-xs font-medium text-gray-700 mb-1">Proveedor de Mantenimiento</label><input type="text" value={equipoEditado.proveedorMantenimiento} onChange={(e) => setEquipoEditado({...equipoEditado, proveedorMantenimiento: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                      <div><label className="block text-xs font-medium text-gray-700 mb-1">Fecha de Alta</label><input type="date" value={equipoEditado.fechaAlta ? equipoEditado.fechaAlta.split('T')[0] : ''} onChange={(e) => setEquipoEditado({...equipoEditado, fechaAlta: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                      <div className="lg:col-span-3">
                        <label className="block text-xs font-medium text-gray-700 mb-1">Descripción del Equipo</label>
                        <textarea value={equipoEditado.descripcion} onChange={(e) => setEquipoEditado({...equipoEditado, descripcion: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" rows="3"></textarea>
                      </div>
                    </div>
                    
                    <div className="pt-6 mt-6 border-t border-gray-100 flex gap-3 justify-end">
                      <button type="button" onClick={() => setIsEditing(false)} className="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium">Cancelar</button>
                      <button disabled={isSyncing} type="submit" className="flex items-center gap-2 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-sm font-medium">
                        {isSyncing ? <i className="fas fa-sync-alt fa-spin"></i> : <i className="fas fa-save"></i>}
                        Guardar Cambios
                      </button>
                    </div>
                  </form>
                </div>
              );
            }

            if (selectedEquipo) {
              const freqText = frecuenciasOptions.find(f => f.id === selectedEquipo.frecuenciaMantenimiento)?.label || 'No asignada';
              return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                  <div className="p-4 border-b border-gray-100 flex items-center gap-4 bg-gray-50">
                    <button onClick={() => setSelectedEquipo(null)} className="text-gray-500 hover:text-blue-600 transition flex items-center gap-2 font-medium px-3 py-1.5 rounded-lg hover:bg-white border border-transparent hover:border-gray-200 shadow-sm">
                      <i className="fas fa-arrow-left"></i> Volver al Inventario
                    </button>
                    <div className="ml-auto flex gap-2">
                      <button onClick={() => { setEquipoEditado({...selectedEquipo}); setIsEditing(true); }} className="flex items-center gap-2 bg-blue-50 text-blue-700 border border-blue-200 px-4 py-2 rounded-lg hover:bg-blue-100 transition shadow-sm font-medium text-sm">
                        <i className="fas fa-edit"></i> Editar Información
                      </button>
                    </div>
                  </div>

                  <div className="p-8">
                    <div className="flex flex-col lg:flex-row justify-between items-start gap-4 mb-8 border-b border-gray-100 pb-6">

                          </select>
                        </div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Nivel de Riesgo</label><input type="text" value={nuevoEquipo.nivelRiesgo} onChange={(e) => setNuevoEquipo({...nuevoEquipo, nivelRiesgo: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Proveedor de Mantenimiento</label><input type="text" value={nuevoEquipo.proveedorMantenimiento} onChange={(e) => setNuevoEquipo({...nuevoEquipo, proveedorMantenimiento: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Fecha de Alta</label><input type="date" value={nuevoEquipo.fechaAlta} onChange={(e) => setNuevoEquipo({...nuevoEquipo, fechaAlta: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
                        <div className="lg:col-span-3">
                          <label className="block text-xs font-medium text-gray-700 mb-1">Descripción del Equipo</label>
                          <textarea value={nuevoEquipo.descripcion} onChange={(e) => setNuevoEquipo({...nuevoEquipo, descripcion: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" rows="3"></textarea>
                        </div>
                      </div>
                      <div className="pt-6 mt-6 border-t border-gray-100 flex gap-3 justify-end">
                        <button type="button" onClick={() => setShowAddEquipo(false)} className="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium">Cancelar</button>
                        <button disabled={isSyncing} type="submit" className="flex items-center gap-2 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-sm font-medium">
                          {isSyncing ? <i className="fas fa-sync-alt fa-spin"></i> : <i className="fas fa-save"></i>}
                          {isSyncing ? 'Guardando en Sheets...' : 'Guardar y Sincronizar'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CMMSHospitalario />);
    </script>
</body>
</html>
